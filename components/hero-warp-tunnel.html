<!-- COMPONENT: Hero Warp Tunnel | COPY: style + html + script -->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hero: CSS 3D Warp Tunnel</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    /* ============================================================
       CUSTOMIZE
    ============================================================ */
    :root {
      --bg:             #0D1117;
      --surface:        #111827;
      --elevated:       #1E293B;
      --accent:         #10B981;
      --accent-dim:     rgba(16,185,129,0.15);
      --accent-border:  rgba(16,185,129,0.3);
      --border:         rgba(148,163,184,0.1);
      --text:           #F8FAFC;
      --text-secondary: #94A3B8;
      --text-muted:     #475569;
      --radius:         12px;
      --font-heading:   'Space Grotesk', sans-serif;
      --font-body:      'Inter', sans-serif;

      --tunnel-speed:   1.2s;  /* Ring cycle duration — lower = faster */
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--font-body);
      overflow: hidden;
      height: 100vh;
      width: 100vw;
    }

    /* Full-viewport scene with perspective set here */
    .scene {
      position: fixed;
      inset: 0;
      perspective: 400px;
      perspective-origin: 50% 50%;
      overflow: hidden;
    }

    /* The tunnel itself — preserve-3d so children exist in 3D space */
    .tunnel {
      position: absolute;
      inset: 0;
      transform-style: preserve-3d;
      transition: transform 0.1s linear; /* smooth mouse parallax */
    }

    /* ── Tunnel rings ── */
    /* Each ring is rotated flat (rotateX 80deg) and staggered along Z */
    @keyframes rushToward {
      from { transform: rotateX(80deg) translateZ(var(--z-start)); opacity: var(--op-start); }
      to   { transform: rotateX(80deg) translateZ(600px);          opacity: 0; }
    }

    .ring {
      position: absolute;
      left: 50%;
      top: 50%;
      width: clamp(300px, 60vmin, 700px);
      height: clamp(300px, 60vmin, 700px);
      border-radius: 50%;
      border: 1px solid var(--accent);
      transform: translate(-50%, -50%) rotateX(80deg) translateZ(var(--z-start));
      transform-origin: center center;
      animation: rushToward var(--tunnel-speed) linear infinite;
      animation-delay: var(--ring-delay);
      opacity: var(--op-start);
      will-change: transform, opacity;
    }

    /* ── Stars ── */
    @keyframes starRush {
      from { transform: translateZ(var(--z-start)); opacity: 0.8; }
      to   { transform: translateZ(900px);           opacity: 0;   }
    }

    .star {
      position: absolute;
      width: 2px;
      height: 2px;
      background: var(--accent);
      border-radius: 50%;
      left: var(--sx);
      top: var(--sy);
      animation: starRush var(--star-speed) linear infinite;
      animation-delay: var(--star-delay);
      opacity: 0;
      will-change: transform;
    }

    /* ── Hero content — floats above the tunnel ── */
    .hero-content {
      position: fixed;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 1.2rem;
      z-index: 10;
      padding: 2rem;
      text-align: center;
      /* Initial state: invisible, zooms in after 800ms */
      opacity: 0;
      transform: scale(0.85);
      transition: opacity 0.6s ease, transform 0.6s cubic-bezier(0.34, 1.3, 0.64, 1);
    }

    .hero-content.visible {
      opacity: 1;
      transform: scale(1);
    }

    /* Glass backing for readability against the tunnel */
    .headline-wrap {
      background: rgba(13,17,23,0.65);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 2.5rem 3.5rem;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 1rem;
      max-width: 680px;
      width: 100%;
    }

    .eyebrow {
      display: inline-flex;
      align-items: center;
      gap: 0.4rem;
      background: var(--accent-dim);
      border: 1px solid var(--accent-border);
      color: var(--accent);
      padding: 0.35rem 0.9rem;
      border-radius: 999px;
      font-size: 0.78rem;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    .headline {
      font-family: var(--font-heading);
      font-size: clamp(2.2rem, 5.5vw, 4.5rem);
      font-weight: 700;
      line-height: 1.05;
      /* Crisp text-shadow for depth against tunnel */
      text-shadow: 0 2px 30px rgba(0,0,0,0.8);
    }

    .headline em {
      font-style: normal;
      color: var(--accent);
    }

    .subline {
      font-size: clamp(0.95rem, 2vw, 1.15rem);
      color: var(--text-secondary);
      max-width: 460px;
      line-height: 1.65;
    }

    .cta-btn {
      margin-top: 0.4rem;
      padding: 0.9rem 2.2rem;
      background: var(--accent);
      color: #0D1117;
      border: none;
      border-radius: 999px;
      font-family: var(--font-heading);
      font-weight: 700;
      font-size: 1rem;
      cursor: pointer;
      letter-spacing: 0.02em;
      transition: box-shadow 0.25s, transform 0.2s;
    }

    .cta-btn:hover {
      box-shadow: 0 0 36px rgba(16,185,129,0.5);
      transform: scale(1.05);
    }

    /* Speed up on hover (CSS var updated by JS) */
    .scene.fast .ring { animation-duration: 0.4s; }

    /* Mobile: reduce ring count effect, disable parallax */
    @media (max-width: 600px) {
      .headline-wrap { padding: 1.8rem 1.5rem; }
    }
  </style>
</head>
<body>

  <!-- 3D Perspective scene -->
  <div class="scene" id="scene">
    <div class="tunnel" id="tunnel">
      <!-- Rings and stars generated by JS -->
    </div>
  </div>

  <!-- Hero content overlay -->
  <div class="hero-content" id="heroContent">
    <div class="headline-wrap">
      <div class="eyebrow">Full Speed Ahead</div>
      <h1 class="headline">You're Moving<br><em>Too Slow</em></h1>
      <p class="subline">
        Every second you wait, another agent is getting the deal. Our platform puts you in hyperdrive — from lead to close at maximum velocity.
      </p>
      <button class="cta-btn" onclick="alert('Launch!')">Launch Now →</button>
    </div>
  </div>

  <script>
    const tunnel = document.getElementById('tunnel');
    const scene  = document.getElementById('scene');

    // ── Generate rings ──────────────────────────────────────────
    const RING_COUNT = 14;

    for (let i = 0; i < RING_COUNT; i++) {
      const ring = document.createElement('div');
      ring.className = 'ring';

      const progress = i / RING_COUNT; // 0..1 front to back

      // Z start: spread rings evenly from -10 to -600
      const zStart = -10 - progress * 590;
      // Opacity: far rings are dimmer (they're "deeper" in the tunnel)
      const opStart = 0.04 + (1 - progress) * 0.12;
      // Delay: offset so rings continuously stream toward viewer
      const delay = -(i / RING_COUNT) * 1.2; // negative = already in progress

      ring.style.setProperty('--z-start', `${zStart}px`);
      ring.style.setProperty('--op-start', opStart);
      ring.style.setProperty('--ring-delay', `${delay}s`);
      tunnel.appendChild(ring);
    }

    // ── Generate stars ──────────────────────────────────────────
    const STAR_COUNT = 80;

    for (let i = 0; i < STAR_COUNT; i++) {
      const star = document.createElement('div');
      star.className = 'star';

      // Random position within viewport (centered cluster)
      const spread = 0.3; // 0.5 = full viewport, 0.3 = clustered center
      const sx = 50 + (Math.random() - 0.5) * 100 * spread;
      const sy = 50 + (Math.random() - 0.5) * 100 * spread;

      const zStart = -(Math.random() * 800);
      const speed  = 0.6 + Math.random() * 1.2;
      const delay  = -(Math.random() * speed); // already in progress

      star.style.setProperty('--sx', `${sx}%`);
      star.style.setProperty('--sy', `${sy}%`);
      star.style.setProperty('--z-start', `${zStart}px`);
      star.style.setProperty('--star-speed', `${speed}s`);
      star.style.setProperty('--star-delay', `${delay}s`);
      tunnel.appendChild(star);
    }

    // ── Mouse parallax — tilt tunnel on mouse move ──────────────
    const isMobile = window.innerWidth <= 768;
    if (!isMobile) {
      document.addEventListener('mousemove', e => {
        const cx = window.innerWidth / 2;
        const cy = window.innerHeight / 2;
        const rx = ((e.clientY - cy) / cy) * 5;  // tilt up/down ±5deg
        const ry = ((e.clientX - cx) / cx) * -5; // tilt left/right ±5deg

        tunnel.style.transform = `rotateX(${rx}deg) rotateY(${ry}deg)`;
      });

      document.addEventListener('mouseleave', () => {
        tunnel.style.transform = '';
      });
    }

    // ── Reveal hero content after 800ms ─────────────────────────
    setTimeout(() => {
      document.getElementById('heroContent').classList.add('visible');
    }, 800);
  </script>
</body>
</html>
