<!-- COMPONENT: Dense KPI Metric Cards | COPY: style + html + script -->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dense KPI Metric Cards</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg:             #0D1117;
      --surface:        #111827;
      --elevated:       #1E293B;
      --accent:         #10B981;
      --accent-dim:     rgba(16,185,129,0.15);
      --accent-border:  rgba(16,185,129,0.3);
      --border:         rgba(148,163,184,0.1);
      --text:           #F8FAFC;
      --text-secondary: #94A3B8;
      --text-muted:     #475569;
      --radius:         12px;
      --font-heading:   'Space Grotesk', sans-serif;
      --font-body:      'Inter', sans-serif;
      --red:            #EF4444;
      --amber:          #F59E0B;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--font-body);
      font-size: 13px;
      padding: 24px;
      min-height: 100vh;
    }
    .wrap { max-width: 1100px; margin: 0 auto; }

    /* ── Header ── */
    .page-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 16px;
      flex-wrap: wrap;
      gap: 10px;
    }
    .page-title { font-family: var(--font-heading); font-size: 1.125rem; font-weight: 600; }
    .view-tabs {
      display: flex;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      overflow: hidden;
    }
    .view-tabs button {
      padding: 6px 14px;
      background: none;
      border: none;
      color: var(--text-secondary);
      font-family: var(--font-body);
      font-size: 0.8125rem;
      cursor: pointer;
      transition: all 0.15s;
    }
    .view-tabs button.active { background: var(--accent); color: #000; font-weight: 600; }
    .view-tabs button:hover:not(.active) { color: var(--text); background: var(--elevated); }

    /* ── KPI Grid ── */
    .kpi-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 12px;
    }
    @media (max-width: 800px) { .kpi-grid { grid-template-columns: repeat(2, 1fr); } }
    @media (max-width: 480px) { .kpi-grid { grid-template-columns: 1fr; } }

    /* ── KPI Card ── */
    .kpi-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 14px 14px 14px 18px;
      border-left: 3px solid transparent;
      cursor: pointer;
      transition: border-color 0.15s, background 0.15s, transform 0.15s;
      position: relative;
      overflow: hidden;
      user-select: none;
    }
    .kpi-card:hover { background: var(--elevated); transform: translateY(-1px); }
    .kpi-card.health-good   { border-left-color: #10B981; }
    .kpi-card.health-warn   { border-left-color: #F59E0B; }
    .kpi-card.health-bad    { border-left-color: #EF4444; }

    .kpi-name {
      font-size: 0.6875rem;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: var(--text-muted);
      margin-bottom: 4px;
    }
    .kpi-val-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      margin-bottom: 6px;
    }
    .kpi-val {
      font-family: var(--font-heading);
      font-size: 1.375rem;
      font-weight: 700;
      line-height: 1;
    }
    .kpi-badge {
      font-size: 0.6875rem;
      font-weight: 700;
      padding: 2px 6px;
      border-radius: 4px;
      flex-shrink: 0;
    }
    .kpi-badge.up   { color: #10B981; background: rgba(16,185,129,0.15); }
    .kpi-badge.down { color: #EF4444; background: rgba(239,68,68,0.12); }
    .kpi-spark { display: block; }
    .kpi-range {
      font-size: 0.6875rem;
      color: var(--text-muted);
      margin-top: 5px;
    }

    /* ── Modal ── */
    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.7);
      z-index: 200;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.2s;
    }
    .modal-overlay.open { opacity: 1; pointer-events: all; }
    .modal {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      width: 100%;
      max-width: 660px;
      padding: 24px;
      transform: translateY(10px);
      transition: transform 0.2s;
    }
    .modal-overlay.open .modal { transform: translateY(0); }
    .modal-header {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      margin-bottom: 20px;
    }
    .modal-title { font-family: var(--font-heading); font-size: 1rem; font-weight: 600; }
    .modal-close {
      background: none; border: none;
      color: var(--text-muted); font-size: 18px;
      cursor: pointer; padding: 2px 6px;
      border-radius: 4px; transition: color 0.15s;
    }
    .modal-close:hover { color: var(--text); }
    .modal-chart-label {
      font-size: 0.6875rem;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: var(--text-muted);
      margin-bottom: 8px;
    }
    canvas#modalChart { display: block; width: 100%; }
    .modal-table {
      margin-top: 20px;
    }
    .modal-table-title { font-size: .6875rem; text-transform:uppercase; letter-spacing:.06em; color:var(--text-muted); margin-bottom:8px; }
    .modal-table table { width:100%; border-collapse:collapse; }
    .modal-table th { font-size:.6875rem; font-weight:600; text-transform:uppercase; letter-spacing:.07em; color:var(--text-muted); padding:6px 10px; text-align:left; border-bottom:1px solid var(--border); }
    .modal-table td { font-size:.8125rem; padding:7px 10px; border-top:1px solid var(--border); color:var(--text-secondary); }
  </style>
</head>
<body>
<div class="wrap">

  <div class="page-header">
    <h2 class="page-title">Business KPIs</h2>
    <div class="view-tabs" id="viewTabs">
      <button data-view="daily" class="active">Daily</button>
      <button data-view="weekly">Weekly</button>
      <button data-view="monthly">Monthly</button>
    </div>
  </div>

  <div class="kpi-grid" id="kpiGrid"></div>

</div>

<!-- Detail modal -->
<div class="modal-overlay" id="modalOverlay">
  <div class="modal">
    <div class="modal-header">
      <div>
        <div class="modal-title" id="modalTitle">Metric Name</div>
        <div style="font-size:.75rem;color:var(--text-muted);margin-top:2px" id="modalSubtitle">30-day trend</div>
      </div>
      <button class="modal-close" id="modalClose">✕</button>
    </div>
    <div class="modal-chart-label">30-Day Trend</div>
    <canvas id="modalChart" height="140"></canvas>
    <div class="modal-table">
      <div class="modal-table-title">Period Breakdown</div>
      <table>
        <thead><tr><th>Period</th><th>Value</th><th>Change</th></tr></thead>
        <tbody id="modalTbody"></tbody>
      </table>
    </div>
  </div>
</div>

<script>
  // ── Metric definitions ────────────────────────────────────────────
  function rnd(min, max) { return Math.random() * (max - min) + min; }
  function rndInt(min, max) { return Math.floor(rnd(min, max)); }

  const METRICS = [
    { name:'Revenue',         fmt:v=>'$'+Math.round(v).toLocaleString(), base:82000, noise:8000,  threshold:[0.05,-0.05], good:'up', unit:'USD' },
    { name:'New Customers',   fmt:v=>Math.round(v).toString(),            base:148,   noise:40,   threshold:[0.08,-0.03], good:'up', unit:'signups' },
    { name:'Churn Rate',      fmt:v=>v.toFixed(2)+'%',                   base:2.4,   noise:0.5,  threshold:[-0.05,0.05], good:'down', unit:'%' },
    { name:'MRR',             fmt:v=>'$'+Math.round(v).toLocaleString(), base:128000, noise:6000, threshold:[0.05,-0.03], good:'up', unit:'USD' },
    { name:'ARR',             fmt:v=>'$'+(v/1000).toFixed(0)+'k',        base:1540000,noise:80000,threshold:[0.04,-0.04], good:'up', unit:'USD' },
    { name:'NPS Score',       fmt:v=>Math.round(v).toString(),            base:54,    noise:10,   threshold:[0.1,-0.08],  good:'up', unit:'pts' },
    { name:'Support Tickets', fmt:v=>Math.round(v).toString(),            base:87,    noise:24,   threshold:[-0.05,0.1],  good:'down', unit:'tickets' },
    { name:'Response Time',   fmt:v=>Math.round(v)+'m',                  base:14,    noise:5,    threshold:[-0.1,0.15],  good:'down', unit:'min' },
    { name:'Uptime',          fmt:v=>v.toFixed(3)+'%',                   base:99.92, noise:0.06, threshold:[0.001,-0.001],good:'up', unit:'%' },
    { name:'Conversion Rate', fmt:v=>v.toFixed(2)+'%',                   base:3.8,   noise:0.7,  threshold:[0.1,-0.05],  good:'up', unit:'%' },
    { name:'CAC',             fmt:v=>'$'+Math.round(v).toString(),        base:280,   noise:50,   threshold:[-0.1,0.1],   good:'down', unit:'USD' },
    { name:'LTV',             fmt:v=>'$'+Math.round(v).toLocaleString(),  base:2400,  noise:200,  threshold:[0.08,-0.05], good:'up', unit:'USD' },
  ];

  let viewMode = 'daily';
  let metricsData = [];

  function genSpark(base, noise, count=30) {
    const pts = [];
    let v = base;
    for (let i=0; i<count; i++) {
      v = v + (Math.random()-0.48) * noise;
      pts.push(Math.max(0, v));
    }
    return pts;
  }

  function genMetrics() {
    const multiplier = viewMode==='weekly' ? 7 : viewMode==='monthly' ? 30 : 1;
    metricsData = METRICS.map(m => {
      const spark = genSpark(m.base * (viewMode==='monthly'?30:viewMode==='weekly'?7:1), m.noise * Math.sqrt(multiplier));
      const current = spark[spark.length-1];
      const prev    = spark[spark.length-8] || spark[0];
      const change  = (current - prev) / (Math.abs(prev)||1);
      const isGood  = m.good==='up' ? change >= m.threshold[0] : change <= m.threshold[1];
      const isWarn  = m.good==='up' ? change >= m.threshold[1] && change < m.threshold[0] : change > m.threshold[1] && change <= m.threshold[0]*-1;
      const health  = isGood ? 'good' : isWarn ? 'warn' : 'bad';
      return { ...m, spark, current, change, health };
    });
  }

  // ── Sparkline ─────────────────────────────────────────────────────
  function drawSparkline(canvas, pts, color, W=80, H=32) {
    canvas.width = W; canvas.height = H;
    const ctx = canvas.getContext('2d');
    ctx.clearRect(0,0,W,H);
    const min = Math.min(...pts), max = Math.max(...pts);
    const range = max-min || 1;
    const coords = pts.map((v,i) => [
      (i/(pts.length-1))*W,
      H - ((v-min)/range)*(H*0.85) - H*0.075
    ]);
    // Fill
    ctx.beginPath();
    coords.forEach(([x,y],i) => i===0 ? ctx.moveTo(x,y) : ctx.lineTo(x,y));
    ctx.lineTo(W,H); ctx.lineTo(0,H); ctx.closePath();
    ctx.fillStyle = color + '18';
    ctx.fill();
    // Line
    ctx.beginPath();
    coords.forEach(([x,y],i) => i===0 ? ctx.moveTo(x,y) : ctx.lineTo(x,y));
    ctx.strokeStyle = color;
    ctx.lineWidth = 1.5;
    ctx.stroke();
  }

  // ── Render cards ─────────────────────────────────────────────────
  function render() {
    genMetrics();
    const grid = document.getElementById('kpiGrid');
    grid.innerHTML = '';

    metricsData.forEach((m, idx) => {
      const up = m.change >= 0;
      const colorMap = { good:'#10B981', warn:'#F59E0B', bad:'#EF4444' };
      const color = colorMap[m.health];
      const min = Math.min(...m.spark), max = Math.max(...m.spark);

      const card = document.createElement('div');
      card.className = `kpi-card health-${m.health}`;
      card.innerHTML = `
        <div class="kpi-name">${m.name}</div>
        <div class="kpi-val-row">
          <div class="kpi-val">${m.fmt(m.current)}</div>
          <div class="kpi-badge ${up?'up':'down'}">${up?'▲':'▼'}${(Math.abs(m.change)*100).toFixed(1)}%</div>
        </div>
        <canvas class="kpi-spark" width="80" height="32"></canvas>
        <div class="kpi-range">Low: ${m.fmt(min)} · High: ${m.fmt(max)}</div>
      `;
      grid.appendChild(card);

      // Draw sparkline
      const sparkCanvas = card.querySelector('.kpi-spark');
      drawSparkline(sparkCanvas, m.spark, color);

      // Click → modal
      card.addEventListener('click', () => openModal(idx));
    });
  }

  // ── Modal ─────────────────────────────────────────────────────────
  function drawModalChart(m, color) {
    const canvas = document.getElementById('modalChart');
    const W = canvas.parentElement.clientWidth;
    canvas.width = W; canvas.height = 140;
    const ctx = canvas.getContext('2d');
    ctx.clearRect(0,0,W,140);

    const pts = m.spark;
    const min = Math.min(...pts), max = Math.max(...pts);
    const range = max-min || 1;
    const pad = {l:48,r:10,t:10,b:24};
    const cw = W-pad.l-pad.r, ch = 140-pad.t-pad.b;

    // Grid
    [0,25,50,75,100].forEach(pct => {
      const v = min + range*(pct/100);
      const y = pad.t + ch - (pct/100)*ch;
      ctx.strokeStyle='rgba(148,163,184,0.07)'; ctx.lineWidth=1;
      ctx.beginPath(); ctx.moveTo(pad.l,y); ctx.lineTo(pad.l+cw,y); ctx.stroke();
      ctx.fillStyle='#475569'; ctx.font='9px Inter,sans-serif'; ctx.textAlign='right';
      ctx.fillText(m.fmt(v), pad.l-4, y+4);
    });

    const coords = pts.map((v,i) => [
      pad.l + (i/(pts.length-1))*cw,
      pad.t + ch - ((v-min)/range)*ch
    ]);

    // Fill
    ctx.beginPath();
    coords.forEach(([x,y],i) => i===0?ctx.moveTo(x,y):ctx.lineTo(x,y));
    ctx.lineTo(pad.l+cw,pad.t+ch); ctx.lineTo(pad.l,pad.t+ch); ctx.closePath();
    const g = ctx.createLinearGradient(0,pad.t,0,pad.t+ch);
    g.addColorStop(0,color+'44'); g.addColorStop(1,color+'00');
    ctx.fillStyle=g; ctx.fill();

    // Line
    ctx.beginPath();
    coords.forEach(([x,y],i) => i===0?ctx.moveTo(x,y):ctx.lineTo(x,y));
    ctx.strokeStyle=color; ctx.lineWidth=2; ctx.stroke();
  }

  function openModal(idx) {
    const m = metricsData[idx];
    const colorMap = { good:'#10B981', warn:'#F59E0B', bad:'#EF4444' };
    const color = colorMap[m.health];

    document.getElementById('modalTitle').textContent = m.name;
    document.getElementById('modalSubtitle').textContent = `${viewMode} view · ${m.unit}`;

    drawModalChart(m, color);

    // Breakdown table: last 7 periods
    const tbody = document.getElementById('modalTbody');
    const step = Math.floor(m.spark.length/7);
    tbody.innerHTML = Array.from({length:7}, (_,i) => {
      const idx = (i+1)*step - 1;
      const v   = m.spark[Math.min(idx, m.spark.length-1)];
      const prev = m.spark[Math.max(0, idx-step)];
      const chg  = (v-prev)/(Math.abs(prev)||1)*100;
      const up   = chg >= 0;
      return `<tr>
        <td>Period ${i+1}</td>
        <td>${m.fmt(v)}</td>
        <td style="color:${up?'#10B981':'#EF4444'}">${up?'▲':'▼'} ${Math.abs(chg).toFixed(1)}%</td>
      </tr>`;
    }).join('');

    document.getElementById('modalOverlay').classList.add('open');
  }

  document.getElementById('modalClose').addEventListener('click', () => {
    document.getElementById('modalOverlay').classList.remove('open');
  });
  document.getElementById('modalOverlay').addEventListener('click', e => {
    if (e.target === document.getElementById('modalOverlay'))
      document.getElementById('modalOverlay').classList.remove('open');
  });

  // ── View toggle ───────────────────────────────────────────────────
  document.getElementById('viewTabs').addEventListener('click', e => {
    const btn = e.target.closest('button[data-view]');
    if (!btn) return;
    document.querySelectorAll('#viewTabs button').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    viewMode = btn.dataset.view;
    render();
  });

  render();
</script>
</body>
</html>
