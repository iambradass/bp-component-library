<!-- COMPONENT: Hero Particle Field | COPY: style + html + script -->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hero: Perlin Noise Particle Flow</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    /* ============================================================
       CUSTOMIZE
    ============================================================ */
    :root {
      --bg:             #0D1117;
      --surface:        #111827;
      --elevated:       #1E293B;
      --accent:         #10B981;
      --accent-dim:     rgba(16,185,129,0.15);
      --accent-border:  rgba(16,185,129,0.3);
      --border:         rgba(148,163,184,0.1);
      --text:           #F8FAFC;
      --text-secondary: #94A3B8;
      --text-muted:     #475569;
      --radius:         12px;
      --font-heading:   'Space Grotesk', sans-serif;
      --font-body:      'Inter', sans-serif;

      --particle-count: 2000; /* Reduce to 800 if perf is an issue */
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--font-body);
      overflow: hidden;
      height: 100vh;
      width: 100vw;
    }

    /* Full-viewport canvas — particles live here */
    #particle-canvas {
      position: fixed;
      inset: 0;
      z-index: 1;
    }

    /* Hero content floats above canvas */
    .hero {
      position: fixed;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 1.3rem;
      padding: 2rem;
      text-align: center;
      z-index: 5;
      pointer-events: none; /* Canvas handles mouse */
    }

    .hero > * { pointer-events: auto; }

    .eyebrow {
      display: inline-flex;
      align-items: center;
      gap: 0.4rem;
      background: rgba(13,17,23,0.6);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      border: 1px solid var(--accent-border);
      color: var(--accent);
      padding: 0.35rem 0.9rem;
      border-radius: 999px;
      font-size: 0.78rem;
      font-weight: 600;
      letter-spacing: 0.07em;
      text-transform: uppercase;
      opacity: 0;
      transition: opacity 0.6s ease;
    }

    .eyebrow.visible { opacity: 1; }

    .headline {
      font-family: var(--font-heading);
      font-size: clamp(2.8rem, 7vw, 6.5rem);
      font-weight: 700;
      line-height: 1.05;
      /* Glass backing so text reads over particles */
      text-shadow: 0 2px 30px rgba(13,17,23,0.8);
      opacity: 0;
      transition: opacity 0.6s ease 0.2s;
    }

    .headline.visible { opacity: 1; }
    .headline em { font-style: normal; color: var(--accent); }

    .subline {
      font-size: clamp(1rem, 2vw, 1.15rem);
      color: var(--text-secondary);
      max-width: 480px;
      line-height: 1.65;
      text-shadow: 0 1px 20px rgba(13,17,23,0.9);
      opacity: 0;
      transition: opacity 0.6s ease 0.4s;
    }

    .subline.visible { opacity: 1; }

    .cta-btn {
      margin-top: 0.4rem;
      padding: 0.95rem 2.4rem;
      background: var(--accent);
      color: #0D1117;
      border: none;
      border-radius: 999px;
      font-family: var(--font-heading);
      font-weight: 700;
      font-size: 1rem;
      cursor: pointer;
      letter-spacing: 0.02em;
      opacity: 0;
      transform: translateY(12px);
      transition: opacity 0.5s ease 0.6s, transform 0.5s cubic-bezier(0.34,1.3,0.64,1) 0.6s, box-shadow 0.2s;
    }

    .cta-btn.visible { opacity: 1; transform: translateY(0); }
    .cta-btn:hover {
      box-shadow: 0 0 32px rgba(16,185,129,0.45);
      transform: scale(1.05);
    }
  </style>
</head>
<body>
  <canvas id="particle-canvas"></canvas>

  <div class="hero">
    <div class="eyebrow" id="eyebrow">Live Flow Field</div>
    <h1 class="headline" id="headline">
      Follow the <em>Signal,</em><br>Close the Deal
    </h1>
    <p class="subline" id="subline">
      Every lead follows a path. We map it, track it, and put you exactly where the flow leads — at the moment of decision.
    </p>
    <button class="cta-btn" id="ctaBtn" onclick="alert('Enter the flow!')">Enter the Flow →</button>
  </div>

  <script>
    // ── VALUE NOISE (no external library needed) ────────────────────
    // A simple, fast value noise implementation for the flow field.
    // Based on a permutation table + bilinear interpolation.

    const PERM = new Uint8Array(512);
    const P256 = new Uint8Array(256);
    for (let i = 0; i < 256; i++) P256[i] = i;
    // Shuffle P256
    for (let i = 255; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [P256[i], P256[j]] = [P256[j], P256[i]];
    }
    for (let i = 0; i < 512; i++) PERM[i] = P256[i & 255];

    function fade(t) { return t * t * t * (t * (t * 6 - 15) + 10); }
    function lerp(a, b, t) { return a + t * (b - a); }

    function grad(hash, x, y) {
      const h = hash & 3;
      const u = h < 2 ? x : y;
      const v = h < 2 ? y : x;
      return ((h & 1) ? -u : u) + ((h & 2) ? -v : v);
    }

    // 2D Perlin noise, returns -1..1
    function noise(x, y) {
      const X = Math.floor(x) & 255;
      const Y = Math.floor(y) & 255;
      const xf = x - Math.floor(x);
      const yf = y - Math.floor(y);
      const u = fade(xf);
      const v = fade(yf);
      const aa = PERM[PERM[X]     + Y];
      const ab = PERM[PERM[X]     + Y + 1];
      const ba = PERM[PERM[X + 1] + Y];
      const bb = PERM[PERM[X + 1] + Y + 1];
      return lerp(
        lerp(grad(aa, xf,   yf),   grad(ba, xf-1, yf),   u),
        lerp(grad(ab, xf,   yf-1), grad(bb, xf-1, yf-1), u),
        v
      );
    }

    // ── CANVAS SETUP ───────────────────────────────────────────────
    const canvas = document.getElementById('particle-canvas');
    const ctx    = canvas.getContext('2d');

    const DPR = Math.min(window.devicePixelRatio, 2);
    let W, H;

    function resize() {
      W = canvas.width  = window.innerWidth  * DPR;
      H = canvas.height = window.innerHeight * DPR;
      canvas.style.width  = window.innerWidth  + 'px';
      canvas.style.height = window.innerHeight + 'px';
    }
    resize();
    window.addEventListener('resize', resize);

    // ── PARTICLE SYSTEM ────────────────────────────────────────────
    const isMobile     = window.innerWidth <= 768;
    const PARTICLE_COUNT = isMobile ? 800 : 2000;
    const FLOW_SCALE   = 0.003; // How zoomed-in the noise field is
    const FLOW_SPEED   = 2.5;   // Particle velocity multiplier
    const TRAIL_ALPHA  = 0.03;  // clearRect alpha — lower = longer trail
    const REPEL_RADIUS = 120;   // px, mouse influence radius
    const REPEL_FORCE  = 3.5;   // max repel displacement per frame

    // Mouse position (in canvas coords)
    let mouseX = -9999, mouseY = -9999;
    let time = 0; // animate the noise field over time (evolving flow)

    document.addEventListener('mousemove', e => {
      mouseX = e.clientX * DPR;
      mouseY = e.clientY * DPR;
    });

    document.addEventListener('mouseleave', () => {
      mouseX = -9999;
      mouseY = -9999;
    });

    // Initialize particles at random positions
    const particles = Array.from({ length: PARTICLE_COUNT }, () => ({
      x: Math.random() * W,
      y: Math.random() * H,
      // Each particle gets a slightly different time offset for organic variation
      t: Math.random() * 100
    }));

    // Particle color: accent at low opacity
    const PARTICLE_COLOR = 'rgba(16,185,129,0.18)';

    function tick() {
      time += 0.005;

      // Trail effect: semi-transparent fill instead of full clear
      ctx.fillStyle = `rgba(13,17,23,${TRAIL_ALPHA})`;
      ctx.fillRect(0, 0, W, H);

      ctx.fillStyle = PARTICLE_COLOR;

      particles.forEach(p => {
        // Get flow direction from Perlin noise
        const angle = noise(p.x * FLOW_SCALE, p.y * FLOW_SCALE + time) * Math.PI * 4;
        let vx = Math.cos(angle) * FLOW_SPEED;
        let vy = Math.sin(angle) * FLOW_SPEED;

        // Mouse repel
        const dx = p.x - mouseX;
        const dy = p.y - mouseY;
        const dist = Math.sqrt(dx * dx + dy * dy);
        if (dist < REPEL_RADIUS * DPR) {
          const force = (1 - dist / (REPEL_RADIUS * DPR)) * REPEL_FORCE;
          const len = dist || 1;
          vx += (dx / len) * force * 2;
          vy += (dy / len) * force * 2;
        }

        p.x += vx;
        p.y += vy;

        // Wrap edges
        if (p.x < 0) p.x = W;
        if (p.x > W) p.x = 0;
        if (p.y < 0) p.y = H;
        if (p.y > H) p.y = 0;

        // Draw particle as a tiny square (faster than arc for 2000+ particles)
        ctx.fillRect(p.x, p.y, 1.5, 1.5);
      });

      requestAnimationFrame(tick);
    }

    tick();

    // ── Reveal hero content ────────────────────────────────────────
    setTimeout(() => {
      document.getElementById('eyebrow').classList.add('visible');
      document.getElementById('headline').classList.add('visible');
      document.getElementById('subline').classList.add('visible');
      document.getElementById('ctaBtn').classList.add('visible');
    }, 500);
  </script>
</body>
</html>
