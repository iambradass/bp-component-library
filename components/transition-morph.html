<!-- COMPONENT: Transition Button Morph | COPY: style + html + script -->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Transition: Button Morph</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">

  <style>
    /* ── CUSTOMIZE ── */
    :root {
      --bg:             #0D1117;
      --accent:         #10B981;
      --accent-dark:    #059669;
      --text:           #F8FAFC;
      --text-secondary: #94A3B8;
      --morph-speed:    520ms;
      --morph-ease:     cubic-bezier(0.65, 0, 0.35, 1);
      --font-heading:   'Space Grotesk', system-ui, sans-serif;
      --font-body:      'Inter', system-ui, sans-serif;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      height: 100%;
      overflow: hidden;
      background: var(--bg);
      color: var(--text);
      font-family: var(--font-body);
    }

    /* ── Pages ── */
    .pages-container {
      position: relative;
      width: 100%;
      height: 100vh;
    }

    .page {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 2rem;
      padding: 2rem;
    }

    .page-content {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 2rem;
      transition: opacity 250ms ease, transform 250ms ease;
    }

    .page-content.fading-out {
      opacity: 0;
      transform: scale(0.96);
    }

    .page-content.fading-in {
      opacity: 0;
      transform: scale(0.96);
    }

    .page.hidden {
      display: none;
    }

    .page-label {
      font-family: var(--font-heading);
      font-size: 0.8125rem;
      font-weight: 600;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--accent);
    }

    .page-headline {
      font-family: var(--font-heading);
      font-size: clamp(2.5rem, 7vw, 5rem);
      font-weight: 700;
      line-height: 1.05;
      text-align: center;
      max-width: 14ch;
    }

    .page-headline em {
      font-style: normal;
      color: var(--accent);
    }

    .page-sub {
      font-size: clamp(0.9rem, 2.5vw, 1.0625rem);
      color: var(--text-secondary);
      text-align: center;
      max-width: 38ch;
      line-height: 1.65;
    }

    /* ── CTA Button (the morphing one) ── */
    .morph-btn {
      display: inline-flex;
      align-items: center;
      gap: 0.625rem;
      padding: 1rem 2.25rem;
      border-radius: 9999px;
      border: none;
      background: var(--accent);
      color: #0D1117;
      font-family: var(--font-heading);
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
      position: relative;
      z-index: 1;
      /* Store id so overlay can reference it */
    }

    /* ── Back Button ── */
    .back-btn {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.875rem 1.75rem;
      border-radius: 9999px;
      border: 1.5px solid rgba(248,250,252,0.2);
      background: transparent;
      color: var(--text);
      font-family: var(--font-heading);
      font-size: 0.9375rem;
      font-weight: 600;
      cursor: pointer;
      transition: border-color 200ms ease, color 200ms ease;
      position: relative;
      z-index: 1;
    }

    .back-btn:hover {
      border-color: var(--accent);
      color: var(--accent);
    }

    /* ── Morph Overlay ── */
    #morph-overlay {
      position: fixed;
      z-index: 200;
      background: var(--accent);
      border-radius: 9999px;
      pointer-events: none;
      /* top/left/width/height set by JS */
    }

    /* ── Page 1 decorative ── */
    .p1-ring {
      position: absolute;
      width: 400px;
      height: 400px;
      border-radius: 50%;
      border: 1px solid rgba(16,185,129,0.1);
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      pointer-events: none;
    }

    .p1-ring:nth-child(2) {
      width: 600px;
      height: 600px;
      border-color: rgba(16,185,129,0.05);
    }

    /* ── Page 2 decorative ── */
    .p2-glow {
      position: absolute;
      inset: 0;
      background: radial-gradient(ellipse 60% 40% at 50% 60%, rgba(16,185,129,0.07) 0%, transparent 70%);
      pointer-events: none;
    }

    .page-2-badge {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.375rem 1rem;
      border-radius: 9999px;
      background: rgba(16,185,129,0.1);
      border: 1px solid rgba(16,185,129,0.25);
      font-size: 0.8125rem;
      font-weight: 600;
      color: var(--accent);
    }

    /* ── Responsive ── */
    @media (max-width: 375px) {
      .page-headline { font-size: 2.25rem; }
      .morph-btn { padding: 0.875rem 1.75rem; font-size: 0.9375rem; }
    }
  </style>
</head>
<body>

<div class="pages-container">

  <!-- Page 1 -->
  <div class="page" id="page-1">
    <div class="p1-ring"></div>
    <div class="p1-ring"></div>
    <div class="page-content" id="p1-content">
      <div class="page-label">The Origin</div>
      <h1 class="page-headline">Press the<br><em>Button.</em></h1>
      <p class="page-sub">Watch the button expand from its exact position to fill the entire viewport — then the new page materializes.</p>
      <button class="morph-btn" id="morph-trigger" onclick="morphForward(this)">
        Open Next Page
        <svg width="18" height="18" viewBox="0 0 18 18" fill="none">
          <path d="M3.75 9h10.5M9.75 4.5l4.5 4.5-4.5 4.5" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </button>
    </div>
  </div>

  <!-- Page 2 -->
  <div class="page hidden" id="page-2">
    <div class="p2-glow"></div>
    <div class="page-content" id="p2-content">
      <div class="page-2-badge">
        <svg width="12" height="12" viewBox="0 0 12 12" fill="none">
          <circle cx="6" cy="6" r="5" fill="currentColor" opacity="0.3"/>
          <circle cx="6" cy="6" r="2.5" fill="currentColor"/>
        </svg>
        New Page
      </div>
      <h1 class="page-headline"><em>You're</em><br>Here Now.</h1>
      <p class="page-sub">The button opened this page. Tap back and the overlay morphs back to the original button position.</p>
      <button class="back-btn" id="back-btn" onclick="morphBack()">
        <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
          <path d="M13 8H3M7 12l-4-4 4-4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
        Back
      </button>
    </div>
  </div>

</div>

<!-- Morph overlay: starts at button rect, expands to full screen -->
<div id="morph-overlay"></div>

<script>
  const overlay = document.getElementById('morph-overlay');
  const p1 = document.getElementById('page-1');
  const p2 = document.getElementById('page-2');
  const p1Content = document.getElementById('p1-content');
  const p2Content = document.getElementById('p2-content');
  const SPEED = 520;
  let isAnimating = false;
  let btnRect = null; // saved so back-transition can use it

  function setOverlayToRect(rect, borderRadius) {
    overlay.style.transition = 'none';
    overlay.style.top = rect.top + 'px';
    overlay.style.left = rect.left + 'px';
    overlay.style.width = rect.width + 'px';
    overlay.style.height = rect.height + 'px';
    overlay.style.borderRadius = borderRadius;
    overlay.style.opacity = '1';
  }

  function morphForward(btn) {
    if (isAnimating) return;
    isAnimating = true;

    btnRect = btn.getBoundingClientRect();
    const computedBR = window.getComputedStyle(btn).borderRadius;

    // Snap overlay to button
    setOverlayToRect(btnRect, computedBR);
    overlay.style.transition = 'none';
    // Force reflow
    overlay.offsetHeight;

    // Expand to full screen
    overlay.style.transition = `top ${SPEED}ms cubic-bezier(0.65,0,0.35,1),
                                 left ${SPEED}ms cubic-bezier(0.65,0,0.35,1),
                                 width ${SPEED}ms cubic-bezier(0.65,0,0.35,1),
                                 height ${SPEED}ms cubic-bezier(0.65,0,0.35,1),
                                 border-radius ${SPEED}ms cubic-bezier(0.65,0,0.35,1)`;
    overlay.style.top = '0px';
    overlay.style.left = '0px';
    overlay.style.width = '100vw';
    overlay.style.height = '100vh';
    overlay.style.borderRadius = '0px';

    // Fade out p1 content early
    setTimeout(() => {
      p1Content.classList.add('fading-out');
    }, SPEED * 0.3);

    // At full screen: swap pages, set up p2 hidden, fade p2 in
    setTimeout(() => {
      p1.classList.add('hidden');
      p2.classList.remove('hidden');
      p2Content.style.opacity = '0';
      p2Content.style.transform = 'scale(0.96)';

      // Fade overlay out (page 2 revealed beneath)
      overlay.style.transition = `opacity 300ms ease`;
      overlay.style.opacity = '0';

      // Fade p2 content in
      setTimeout(() => {
        p2Content.style.transition = 'opacity 350ms ease, transform 350ms ease';
        p2Content.style.opacity = '1';
        p2Content.style.transform = 'scale(1)';
      }, 80);

      setTimeout(() => {
        p1Content.classList.remove('fading-out');
        p1Content.style.opacity = '';
        p1Content.style.transform = '';
        isAnimating = false;
      }, 380);

    }, SPEED + 20);
  }

  function morphBack() {
    if (isAnimating || !btnRect) return;
    isAnimating = true;

    // Show overlay at full screen instantly
    overlay.style.transition = 'none';
    overlay.style.top = '0px';
    overlay.style.left = '0px';
    overlay.style.width = '100vw';
    overlay.style.height = '100vh';
    overlay.style.borderRadius = '0px';
    overlay.style.opacity = '1';
    overlay.offsetHeight;

    // Fade p2 content out
    p2Content.style.transition = 'opacity 200ms ease';
    p2Content.style.opacity = '0';

    setTimeout(() => {
      // Swap pages
      p2.classList.add('hidden');
      p1.classList.remove('hidden');
      p1Content.style.opacity = '0';

      // Morph overlay back to button position
      overlay.style.transition = `top ${SPEED}ms cubic-bezier(0.65,0,0.35,1),
                                   left ${SPEED}ms cubic-bezier(0.65,0,0.35,1),
                                   width ${SPEED}ms cubic-bezier(0.65,0,0.35,1),
                                   height ${SPEED}ms cubic-bezier(0.65,0,0.35,1),
                                   border-radius ${SPEED}ms cubic-bezier(0.65,0,0.35,1)`;
      overlay.style.top = btnRect.top + 'px';
      overlay.style.left = btnRect.left + 'px';
      overlay.style.width = btnRect.width + 'px';
      overlay.style.height = btnRect.height + 'px';
      overlay.style.borderRadius = '9999px';

      // Reveal p1 content as overlay collapses
      setTimeout(() => {
        p1Content.style.transition = 'opacity 300ms ease, transform 300ms ease';
        p1Content.style.opacity = '1';
        p1Content.style.transform = 'scale(1)';
      }, SPEED * 0.4);

      // Fade overlay away
      setTimeout(() => {
        overlay.style.transition = 'opacity 200ms ease';
        overlay.style.opacity = '0';
      }, SPEED + 10);

      setTimeout(() => {
        p2Content.style.opacity = '';
        p2Content.style.transform = '';
        p2Content.style.transition = '';
        p1Content.style.opacity = '';
        p1Content.style.transform = '';
        p1Content.style.transition = '';
        isAnimating = false;
      }, SPEED + 250);

    }, 220);
  }
</script>
</body>
</html>
