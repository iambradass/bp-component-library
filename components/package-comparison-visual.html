<!-- COMPONENT: Package Comparison Visual | COPY: style + html + script -->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Package Comparison — Visual Cards</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">

  <style>
    :root {
      --bg:             #0D1117;
      --surface:        #111827;
      --elevated:       #1E293B;
      --accent:         #10B981;
      --accent-dim:     rgba(16,185,129,0.15);
      --accent-border:  rgba(16,185,129,0.3);
      --border:         rgba(148,163,184,0.1);
      --text:           #F8FAFC;
      --text-secondary: #94A3B8;
      --text-muted:     #475569;
      --radius:         12px;
      --font-heading:   'Space Grotesk', sans-serif;
      --font-body:      'Inter', sans-serif;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: var(--bg); color: var(--text);
      font-family: var(--font-body); min-height: 100vh;
      padding: 3rem 1rem 5rem;
    }

    .pcv-wrap { max-width: 960px; margin: 0 auto; }

    /* ── Header ── */
    .pcv-eyebrow {
      display: inline-flex; align-items: center; gap: 8px;
      font-family: var(--font-heading); font-size: 0.75rem; font-weight: 600;
      color: var(--accent); text-transform: uppercase; letter-spacing: 0.1em;
      padding: 4px 14px; background: var(--accent-dim);
      border: 1px solid var(--accent-border); border-radius: 100px;
      margin-bottom: 1rem;
    }
    .pcv-title {
      font-family: var(--font-heading); font-size: clamp(1.75rem, 4vw, 2.5rem);
      font-weight: 700; letter-spacing: -0.02em; margin-bottom: 0.5rem;
    }
    .pcv-subtitle {
      color: var(--text-secondary); font-size: 1rem; line-height: 1.6;
      max-width: 520px; margin-bottom: 1.5rem;
    }

    /* ── Diff toggle ── */
    .pcv-toggle-row {
      display: flex; align-items: center; gap: 0.75rem; margin-bottom: 2rem;
    }
    .pcv-toggle-btn {
      height: 34px; padding: 0 16px; border-radius: 100px;
      border: 1px solid var(--border); background: var(--surface);
      font-family: var(--font-heading); font-size: 0.8125rem; font-weight: 600;
      color: var(--text-muted); cursor: pointer; transition: all 0.18s;
    }
    .pcv-toggle-btn.active {
      background: var(--accent-dim); border-color: var(--accent-border); color: var(--accent);
    }
    .pcv-toggle-label { font-size: 0.875rem; color: var(--text-muted); }

    /* ── Desktop 3-col grid ── */
    .pcv-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 1rem;
      align-items: start;
    }
    @media (max-width: 700px) { .pcv-grid { grid-template-columns: 1fr; } }

    /* Mobile carousel override */
    @media (max-width: 700px) {
      .pcv-grid {
        display: flex; overflow-x: auto; scroll-snap-type: x mandatory;
        scrollbar-width: none; gap: 1rem; padding-bottom: 4px;
      }
      .pcv-grid::-webkit-scrollbar { display: none; }
      .pcv-card { flex: 0 0 85vw; scroll-snap-align: start; }
    }

    /* ── Package card ── */
    .pcv-card {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--radius); padding: 1.5rem;
      display: flex; flex-direction: column; gap: 1rem;
      position: relative; overflow: hidden;
      transition: box-shadow 0.2s;
    }
    .pcv-card.featured {
      border-color: var(--accent-border);
      box-shadow: 0 0 40px rgba(16,185,129,0.15);
    }

    /* "Most Popular" ribbon */
    .pcv-popular {
      position: absolute; top: 16px; right: -28px;
      background: var(--accent); color: var(--bg);
      font-family: var(--font-heading); font-size: 0.625rem; font-weight: 700;
      text-transform: uppercase; letter-spacing: 0.08em;
      padding: 4px 36px; transform: rotate(35deg);
    }

    .pcv-tier {
      font-family: var(--font-heading); font-size: 0.6875rem; font-weight: 700;
      text-transform: uppercase; letter-spacing: 0.12em; color: var(--accent);
    }
    .pcv-name {
      font-family: var(--font-heading); font-size: 1.375rem; font-weight: 700;
      margin-bottom: 0.25rem;
    }
    .pcv-tagline { font-size: 0.8125rem; color: var(--text-muted); margin-bottom: 0.5rem; }
    .pcv-price {
      font-family: var(--font-heading); font-size: 2rem; font-weight: 700;
      color: var(--accent); line-height: 1;
    }
    .pcv-price span { font-size: 1rem; color: var(--text-muted); font-weight: 400; }
    .pcv-bestfor {
      font-size: 0.8125rem; color: var(--text-secondary);
      padding: 0.625rem 0.875rem; background: var(--elevated);
      border-radius: 8px; border-left: 3px solid var(--accent-border);
    }

    /* Feature list */
    .pcv-features { list-style: none; display: flex; flex-direction: column; gap: 8px; flex: 1; }
    .pcv-feature {
      display: flex; align-items: flex-start; gap: 8px;
      font-size: 0.8125rem; line-height: 1.4; transition: opacity 0.2s;
    }
    .pcv-feature.diff-fade { opacity: 0.25; } /* dim same rows when diff mode on */
    .pcv-feature.diff-highlight { background: rgba(16,185,129,0.08); margin: 0 -0.5rem; padding: 2px 0.5rem; border-radius: 4px; }

    .pcv-feat-icon { flex-shrink: 0; margin-top: 1px; }
    .pcv-check { color: var(--accent); }
    .pcv-x     { color: var(--text-muted); }

    /* Signature callout */
    .pcv-highlight {
      background: var(--accent-dim); border: 1px solid var(--accent-border);
      border-radius: 8px; padding: 0.875rem;
    }
    .pcv-highlight-label {
      font-family: var(--font-heading); font-size: 0.625rem; font-weight: 700;
      text-transform: uppercase; letter-spacing: 0.1em; color: var(--accent); margin-bottom: 0.35rem;
    }
    .pcv-highlight-text { font-size: 0.8125rem; color: var(--text); font-weight: 500; }

    /* CTA */
    .pcv-cta {
      display: block; width: 100%; padding: 0.875rem;
      border-radius: 10px; font-family: var(--font-heading);
      font-size: 0.9375rem; font-weight: 700; border: none;
      cursor: pointer; text-align: center; transition: opacity 0.18s, transform 0.18s;
    }
    .pcv-cta:hover { opacity: 0.88; transform: translateY(-1px); }
    .pcv-cta.primary { background: var(--accent); color: var(--bg); }
    .pcv-cta.secondary { background: var(--elevated); color: var(--text); border: 1px solid var(--border); }
  </style>
</head>
<body>

<div class="pcv-wrap">

  <div class="pcv-eyebrow">
    <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><rect x="1" y="1" width="22" height="22" rx="2"/><path d="M8 1v22M15 1v22M1 8h22M1 15h22"/></svg>
    Choose Your Plan
  </div>
  <h2 class="pcv-title">Pick the Package That Fits</h2>
  <p class="pcv-subtitle">All plans include hosting, SSL, and our core website build. Upgrade as your business grows.</p>

  <!-- Diff toggle -->
  <div class="pcv-toggle-row">
    <button class="pcv-toggle-btn" id="pcvDiffBtn">See What's Different</button>
    <span class="pcv-toggle-label" id="pcvDiffLabel">Show all features</span>
  </div>

  <!-- Package cards -->
  <div class="pcv-grid" id="pcvGrid"></div>

</div>

<script>
(function() {
  'use strict';

  /* Feature rows: each entry is [label, starter-included, pro-included, authority-included] */
  /* true = included, false = not included */
  var features = [
    ['5-Page Custom Website',      true,  true,  true ],
    ['Mobile-First Design',        true,  true,  true ],
    ['Hosting + SSL + Domain',     true,  true,  true ],
    ['Contact Forms + CRM',        true,  true,  true ],
    ['Basic SEO Setup',            true,  true,  true ],
    ['Google Analytics',           true,  true,  true ],
    ['10-Page Website',            false, true,  true ],
    ['Full SEO Strategy',          false, true,  true ],
    ['Google Business Profile',    false, true,  true ],
    ['Monthly Performance Report', false, true,  true ],
    ['Review Funnel',              false, true,  true ],
    ['Priority 24hr Support',      false, true,  true ],
    ['Content Strategy (12 mo)',   false, false, true ],
    ['Testimonial Video Page',     false, false, true ],
    ['Google Ads Setup',           false, false, true ],
    ['Quarterly Strategy Call',    false, false, true ],
  ];

  var packages = [
    {
      tier: 'Starter', name: 'Launch',
      tagline: 'Get online fast with a clean, professional site',
      price: '$47', period: '/mo',
      bestfor: 'Best for new title reps building their first online presence',
      highlight: 'Everything you need to stop being invisible online — without the complexity.',
      cta: 'Get Started', ctaStyle: 'secondary',
      featCol: 1,
    },
    {
      tier: 'Professional', name: 'Grow',
      tagline: 'Your complete digital marketing engine',
      price: '$97', period: '/mo',
      bestfor: 'Best for reps ready to generate inbound leads consistently',
      highlight: 'The most popular plan — full SEO, CRM integration, and monthly reporting.',
      cta: 'Get Started — Most Popular', ctaStyle: 'primary',
      featCol: 2, featured: true,
    },
    {
      tier: 'Authority', name: 'Dominate',
      tagline: 'Full-stack web presence + marketing strategy',
      price: '$197', period: '/mo',
      bestfor: 'Best for established reps competing for regional dominance',
      highlight: 'Content strategy, video, and paid ads — everything to become the name in your market.',
      cta: 'Get Started', ctaStyle: 'secondary',
      featCol: 3,
    },
  ];

  var grid = document.getElementById('pcvGrid');
  var diffBtn = document.getElementById('pcvDiffBtn');
  var diffLabel = document.getElementById('pcvDiffLabel');
  var diffMode = false;

  function buildCards() {
    grid.innerHTML = '';

    packages.forEach(function(pkg) {
      var card = document.createElement('div');
      card.className = 'pcv-card' + (pkg.featured ? ' featured' : '');

      /* Determine which features are "different" (not same across all 3) */
      var featHtml = features.map(function(row, fi) {
        var included = row[pkg.featCol]; /* index 1/2/3 */
        /* A row is "different" if it's not the same value across all 3 tiers */
        var isDiff = !(row[1] === row[2] && row[2] === row[3]);
        var icon = included
          ? '<svg class="pcv-feat-icon pcv-check" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>'
          : '<svg class="pcv-feat-icon pcv-x" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>';
        var cls = 'pcv-feature';
        if (diffMode) cls += isDiff ? ' diff-highlight' : ' diff-fade';
        return '<li class="' + cls + '" data-diff="' + isDiff + '">' + icon + '<span>' + row[0] + '</span></li>';
      }).join('');

      card.innerHTML =
        (pkg.featured ? '<div class="pcv-popular">Most Popular</div>' : '') +
        '<div>' +
          '<div class="pcv-tier">' + pkg.tier + '</div>' +
          '<div class="pcv-name">' + pkg.name + '</div>' +
          '<div class="pcv-tagline">' + pkg.tagline + '</div>' +
        '</div>' +
        '<div class="pcv-price">' + pkg.price + '<span>' + pkg.period + '</span></div>' +
        '<div class="pcv-bestfor">' + pkg.bestfor + '</div>' +
        '<ul class="pcv-features">' + featHtml + '</ul>' +
        '<div class="pcv-highlight">' +
          '<div class="pcv-highlight-label">Signature Feature</div>' +
          '<div class="pcv-highlight-text">' + pkg.highlight + '</div>' +
        '</div>' +
        '<button class="pcv-cta ' + pkg.ctaStyle + '">' + pkg.cta + '</button>';

      grid.appendChild(card);
    });
  }

  /* Diff toggle */
  diffBtn.addEventListener('click', function() {
    diffMode = !diffMode;
    diffBtn.classList.toggle('active', diffMode);
    diffLabel.textContent = diffMode ? 'Showing only differences' : 'Show all features';
    buildCards();
  });

  buildCards();

})();
</script>
</body>
</html>
