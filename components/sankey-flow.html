<!-- COMPONENT: Sankey Flow Diagram | COPY: style + html + script -->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sankey Flow Diagram</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg:             #0D1117;
      --surface:        #111827;
      --elevated:       #1E293B;
      --accent:         #10B981;
      --accent-dim:     rgba(16,185,129,0.15);
      --accent-border:  rgba(16,185,129,0.3);
      --border:         rgba(148,163,184,0.1);
      --text:           #F8FAFC;
      --text-secondary: #94A3B8;
      --text-muted:     #475569;
      --radius:         12px;
      --font-heading:   'Space Grotesk', sans-serif;
      --font-body:      'Inter', sans-serif;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--font-body);
      font-size: 13px;
      padding: 24px;
      min-height: 100vh;
    }
    .wrap { max-width: 1100px; margin: 0 auto; }

    /* ── Header ── */
    .sk-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 16px;
      flex-wrap: wrap;
      gap: 10px;
    }
    .sk-title { font-family: var(--font-heading); font-size: 1.125rem; font-weight: 600; }
    .sk-subtitle { font-size: 0.8125rem; color: var(--text-muted); margin-top: 2px; }

    /* ── Legend (source toggles) ── */
    .sk-legend {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }
    .sk-legend-btn {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 5px 10px;
      border-radius: 20px;
      border: 1px solid transparent;
      background: var(--surface);
      color: var(--text-secondary);
      font-family: var(--font-body);
      font-size: 0.75rem;
      cursor: pointer;
      transition: all 0.15s;
    }
    .sk-legend-btn.active { border-color: var(--border); background: var(--elevated); color: var(--text); }
    .sk-legend-btn.dimmed { opacity: 0.4; }
    .sk-legend-dot { width: 8px; height: 8px; border-radius: 50%; }

    /* ── Canvas card ── */
    .canvas-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
    }
    canvas#sankeyCanvas { display: block; width: 100%; }

    /* ── Tooltip ── */
    .sk-tooltip {
      position: fixed;
      background: var(--elevated);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 10px 14px;
      font-size: 0.8125rem;
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.1s;
      z-index: 100;
      white-space: nowrap;
    }
    .sk-tooltip.visible { opacity: 1; }
    .sk-tooltip-from { font-weight: 600; }
    .sk-tooltip-val { color: var(--accent); margin-top: 2px; }
    .sk-tooltip-pct { color: var(--text-muted); font-size: 0.75rem; }
  </style>
</head>
<body>
<div class="wrap">
  <div class="sk-header">
    <div>
      <h2 class="sk-title">Website Traffic Flow</h2>
      <div class="sk-subtitle">Source → Landing Page → Outcome · 6,780 total users</div>
    </div>
    <div class="sk-legend" id="skLegend"></div>
  </div>

  <div class="canvas-card">
    <canvas id="sankeyCanvas" height="480"></canvas>
  </div>
</div>

<div class="sk-tooltip" id="skTooltip"></div>

<script>
  // ── Data ─────────────────────────────────────────────────────────
  const SOURCES = [
    { id:'google',   label:'Google',   color:'#10B981', value:2240 },
    { id:'direct',   label:'Direct',   color:'#3B82F6', value:1580 },
    { id:'social',   label:'Social',   color:'#8B5CF6', value:980  },
    { id:'email',    label:'Email',    color:'#F59E0B', value:820  },
    { id:'referral', label:'Referral', color:'#EF4444', value:1160 },
  ];

  const PAGES = [
    { id:'home',    label:'Home'    },
    { id:'blog',    label:'Blog'    },
    { id:'pricing', label:'Pricing' },
    { id:'about',   label:'About'   },
  ];

  const OUTCOMES = [
    { id:'signup',  label:'Signup'  },
    { id:'contact', label:'Contact' },
    { id:'bounce',  label:'Bounce'  },
    { id:'exit',    label:'Exit'    },
  ];

  // Flows: source → page (fraction of source value)
  const SP_FRACS = {
    google:   { home:0.45, blog:0.30, pricing:0.18, about:0.07 },
    direct:   { home:0.50, blog:0.15, pricing:0.25, about:0.10 },
    social:   { home:0.35, blog:0.45, pricing:0.10, about:0.10 },
    email:    { home:0.20, blog:0.30, pricing:0.40, about:0.10 },
    referral: { home:0.40, blog:0.25, pricing:0.20, about:0.15 },
  };

  // Page → outcome fractions
  const PO_FRACS = {
    home:    { signup:0.08, contact:0.05, bounce:0.55, exit:0.32 },
    blog:    { signup:0.05, contact:0.03, bounce:0.65, exit:0.27 },
    pricing: { signup:0.22, contact:0.18, bounce:0.35, exit:0.25 },
    about:   { signup:0.04, contact:0.12, bounce:0.45, exit:0.39 },
  };

  // Compute flow values
  function buildFlows(hiddenSources) {
    const spFlows = []; // {from, to, value, color}
    const pageVals = {};
    PAGES.forEach(p => pageVals[p.id] = 0);

    SOURCES.forEach(src => {
      if (hiddenSources.has(src.id)) return;
      Object.entries(SP_FRACS[src.id]).forEach(([pageId, frac]) => {
        const v = Math.round(src.value * frac);
        spFlows.push({ from:src.id, to:pageId, value:v, color:src.color });
        pageVals[pageId] = (pageVals[pageId]||0) + v;
      });
    });

    const poFlows = [];
    const outcomeVals = {};
    PAGES.forEach(page => {
      const pv = pageVals[page.id] || 0;
      Object.entries(PO_FRACS[page.id]).forEach(([outcId, frac]) => {
        const v = Math.round(pv * frac);
        poFlows.push({ from:page.id, to:outcId, value:v, color:'#475569' });
        outcomeVals[outcId] = (outcomeVals[outcId]||0) + v;
      });
    });

    return { spFlows, poFlows, pageVals, outcomeVals };
  }

  // ── Layout constants ──────────────────────────────────────────────
  const NODE_W = 18, GAP = 12;
  let hoveredFlow = null;
  let hiddenSources = new Set();

  function render() {
    const canvas = document.getElementById('sankeyCanvas');
    const W = canvas.parentElement.clientWidth;
    const H = 480;
    canvas.width = W;
    canvas.height = H;
    const ctx = canvas.getContext('2d');
    ctx.clearRect(0,0,W,H);

    const { spFlows, poFlows, pageVals, outcomeVals } = buildFlows(hiddenSources);
    const totalIn = SOURCES.filter(s=>!hiddenSources.has(s.id)).reduce((a,s)=>a+s.value,0);
    if (totalIn === 0) return;

    const PAD = 80; // top/bottom padding
    const visibleHeight = H - PAD*2;
    const NODE_GAP = 8; // gap between nodes in same column

    // ── Column X positions ──
    const col0X = 60, col1X = Math.floor(W*0.35), col2X = Math.floor(W*0.65), col3X = W - 80;

    // ── Build node rects ──
    // Col 0: sources
    function buildColRects(items, vals, colX, totalH) {
      const total = Object.values(vals).reduce((a,b)=>a+b,0) || 1;
      const availH = visibleHeight - NODE_GAP * (items.length-1);
      let y = PAD;
      return items.map(item => {
        const v = vals[item.id] || 0;
        const h = Math.max(4, (v/total)*availH);
        const rect = { id:item.id, label:item.label, x:colX, y, w:NODE_W, h, value:v, color:item.color||'#475569' };
        y += h + NODE_GAP;
        return rect;
      });
    }

    const srcVals = {};
    SOURCES.forEach(s => srcVals[s.id] = hiddenSources.has(s.id) ? 0 : s.value);

    const col0 = buildColRects(SOURCES, srcVals, col0X, visibleHeight);
    const col1 = buildColRects(PAGES, pageVals, col1X, visibleHeight);
    const col2 = buildColRects(PAGES, pageVals, col2X, visibleHeight);
    const col3 = buildColRects(OUTCOMES, outcomeVals, col3X, visibleHeight);

    // ── Flow offset trackers (so flows stack within nodes) ──
    const fromOffsets = {}, toOffsets = {};
    const initOffsets = rects => rects.forEach(r => { fromOffsets[r.id] = r.y; toOffsets[r.id] = r.y; });
    initOffsets(col0); initOffsets(col1); initOffsets(col2); initOffsets(col3);

    // ── Draw bezier flows ──
    function drawFlow(flows, srcRects, dstRects, dim) {
      flows.forEach((flow, fi) => {
        const src = srcRects.find(r=>r.id===flow.from);
        const dst = dstRects.find(r=>r.id===flow.to);
        if (!src || !dst || flow.value === 0) return;

        const total = srcRects.reduce((a,r)=>a+r.value,0) || 1;
        const fh = Math.max(1, (flow.value / (src.value||1)) * src.h);
        const th = Math.max(1, (flow.value / (dst.value||1)) * dst.h);

        const x1 = src.x + NODE_W;
        const y1 = fromOffsets[src.id] + fh/2;
        const x2 = dst.x;
        const y2 = toOffsets[dst.id] + th/2;

        const isHovered = hoveredFlow && hoveredFlow.fi === fi && hoveredFlow.layer === dim;
        const alpha = isHovered ? 0.7 : (hoveredFlow ? 0.1 : 0.35);

        fromOffsets[src.id] = (fromOffsets[src.id]||src.y) + fh;
        toOffsets[dst.id]   = (toOffsets[dst.id]||dst.y)   + th;

        // Bezier curve
        const mx = (x1+x2)/2;
        ctx.beginPath();
        ctx.moveTo(x1, y1 - fh/2);
        ctx.bezierCurveTo(mx, y1-fh/2, mx, y2-th/2, x2, y2-th/2);
        ctx.bezierCurveTo(mx, y2-th/2, mx, y2+th/2, x2, y2+th/2); // bottom
        ctx.bezierCurveTo(mx, y2+th/2, mx, y1+fh/2, x1, y1+fh/2);
        ctx.closePath();

        const grad = ctx.createLinearGradient(x1, 0, x2, 0);
        const baseCol = flow.color;
        grad.addColorStop(0, hexAlpha(baseCol, alpha));
        grad.addColorStop(1, hexAlpha(baseCol, alpha*0.7));
        ctx.fillStyle = grad;
        ctx.fill();

        // Store hit for hover
        flow._x1=x1; flow._y1=y1; flow._x2=x2; flow._y2=y2; flow._fh=fh; flow._th=th;
        flow._fi=fi; flow._layer=dim;
      });
    }

    drawFlow(spFlows, col0, col1, 'sp');
    // Reset offsets for col1→col2 (page nodes are repeated)
    initOffsets(col1); initOffsets(col2); initOffsets(col3);
    drawFlow(poFlows, col1, col3, 'po');

    // ── Draw nodes ──
    function drawNodes(rects, labelRight) {
      rects.forEach(r => {
        if (r.value === 0) return;
        ctx.fillStyle = r.color;
        ctx.beginPath();
        ctx.roundRect(r.x, r.y, r.w, r.h, 3);
        ctx.fill();

        ctx.font = '11px Inter, sans-serif';
        ctx.fillStyle = '#94A3B8';
        ctx.textBaseline = 'middle';
        const mid = r.y + r.h/2;
        if (labelRight) {
          ctx.textAlign = 'left';
          ctx.fillText(r.label, r.x + r.w + 8, mid - 5);
          ctx.fillStyle = '#F8FAFC';
          ctx.font = 'bold 11px Space Grotesk, sans-serif';
          ctx.fillText(r.value.toLocaleString(), r.x + r.w + 8, mid + 6);
        } else {
          ctx.textAlign = 'right';
          ctx.fillText(r.label, r.x - 8, mid - 5);
          ctx.fillStyle = '#F8FAFC';
          ctx.font = 'bold 11px Space Grotesk, sans-serif';
          ctx.fillText(r.value.toLocaleString(), r.x - 8, mid + 6);
        }
      });
    }

    drawNodes(col0, true);
    drawNodes(col1, false);
    drawNodes(col3, false);

    // Store for hover
    canvas._spFlows = spFlows;
    canvas._poFlows = poFlows;
    canvas._col0 = col0;
    canvas._totalIn = totalIn;
  }

  function hexAlpha(col, a) {
    if (col.startsWith('#')) {
      const r = parseInt(col.slice(1,3),16);
      const g = parseInt(col.slice(3,5),16);
      const b = parseInt(col.slice(5,7),16);
      return `rgba(${r},${g},${b},${a})`;
    }
    return col;
  }

  // ── Hover detection (bounding box approximation) ─────────────────
  document.getElementById('sankeyCanvas').addEventListener('mousemove', function(e) {
    const rect = this.getBoundingClientRect();
    const mx = e.clientX - rect.left;
    const my = e.clientY - rect.top;
    const tip = document.getElementById('skTooltip');

    let hit = null;
    const allFlows = [...(this._spFlows||[]), ...(this._poFlows||[])];

    // Simple hit: point near the bezier midpoint
    allFlows.forEach(flow => {
      if (!flow._x1) return;
      const midX = (flow._x1 + flow._x2)/2;
      const midY = (flow._y1 + flow._y2)/2;
      const maxH = Math.max(flow._fh, flow._th);
      if (Math.abs(mx - midX) < (flow._x2-flow._x1)/2 && Math.abs(my - midY) < maxH/2+8) {
        hit = flow;
      }
    });

    if (hit) {
      const total = this._totalIn || 1;
      const pct = ((hit.value/total)*100).toFixed(1);
      const srcNode = (this._col0||[]).find(r=>r.id===hit.from);
      const fromLabel = srcNode ? srcNode.label : hit.from;
      tip.innerHTML = `<div class="sk-tooltip-from">${fromLabel} → ${hit.to}</div>
        <div class="sk-tooltip-val">${hit.value.toLocaleString()} users</div>
        <div class="sk-tooltip-pct">${pct}% of total</div>`;
      tip.classList.add('visible');
      tip.style.left=(e.clientX+14)+'px';
      tip.style.top=(e.clientY+14)+'px';
      if (!hoveredFlow || hoveredFlow.fi !== hit._fi || hoveredFlow.layer !== hit._layer) {
        hoveredFlow = {fi:hit._fi, layer:hit._layer};
        render();
      }
    } else {
      tip.classList.remove('visible');
      if (hoveredFlow) { hoveredFlow = null; render(); }
    }
  });

  document.getElementById('sankeyCanvas').addEventListener('mouseleave', () => {
    document.getElementById('skTooltip').classList.remove('visible');
    hoveredFlow = null;
    render();
  });

  // ── Legend (toggle sources) ───────────────────────────────────────
  const legend = document.getElementById('skLegend');
  SOURCES.forEach(src => {
    const btn = document.createElement('button');
    btn.className = 'sk-legend-btn active';
    btn.dataset.id = src.id;
    btn.innerHTML = `<div class="sk-legend-dot" style="background:${src.color}"></div>${src.label}`;
    btn.addEventListener('click', () => {
      if (hiddenSources.has(src.id)) {
        hiddenSources.delete(src.id);
        btn.classList.remove('dimmed');
      } else {
        hiddenSources.add(src.id);
        btn.classList.add('dimmed');
      }
      hoveredFlow = null;
      render();
    });
    legend.appendChild(btn);
  });

  render();
  window.addEventListener('resize', render);
</script>
</body>
</html>
