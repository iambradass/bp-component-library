<!-- COMPONENT: Hero Countdown | COPY: style + html + script -->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hero: Cinematic 3-2-1 Launch</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    /* ============================================================
       CUSTOMIZE
    ============================================================ */
    :root {
      --bg:             #0D1117;
      --surface:        #111827;
      --elevated:       #1E293B;
      --accent:         #10B981;
      --accent-dim:     rgba(16,185,129,0.15);
      --accent-border:  rgba(16,185,129,0.3);
      --border:         rgba(148,163,184,0.1);
      --text:           #F8FAFC;
      --text-secondary: #94A3B8;
      --text-muted:     #475569;
      --radius:         12px;
      --font-heading:   'Space Grotesk', sans-serif;
      --font-body:      'Inter', sans-serif;

      /* Countdown timing (ms) */
      --hold-ms: 700;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      height: 100%;
      overflow: hidden;
    }

    body {
      background: #000;
      color: var(--text);
      font-family: var(--font-body);
    }

    /* ── COUNTDOWN STAGE ── */
    .countdown-stage {
      position: fixed;
      inset: 0;
      background: #000;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 200;
      transition: opacity 0.1s;
    }

    .countdown-stage.hidden { display: none; }

    /* The big number */
    .count-number {
      font-family: var(--font-heading);
      font-size: clamp(30vw, 38vw, 580px);
      font-weight: 700;
      color: var(--accent);
      line-height: 1;
      position: absolute;
      opacity: 0;
      user-select: none;
      transition: opacity 0.2s;
    }

    .count-number.active { opacity: 1; }

    /* Progress ring around the number */
    .count-ring {
      position: absolute;
      width: clamp(50vw, 60vw, 700px);
      height: clamp(50vw, 60vw, 700px);
    }

    .count-ring circle {
      fill: none;
      stroke-width: 3;
      transform-origin: 50% 50%;
      transform: rotate(-90deg);
    }

    .ring-track { stroke: rgba(16,185,129,0.1); }
    .ring-fill  {
      stroke: var(--accent);
      stroke-linecap: round;
      stroke-dasharray: 1000;
      stroke-dashoffset: 1000;
      transition: stroke-dashoffset linear;
    }

    /* Flash overlay */
    .flash {
      position: fixed;
      inset: 0;
      background: #fff;
      z-index: 300;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.08s;
    }

    /* ── HERO ── */
    .hero {
      position: fixed;
      inset: 0;
      background: var(--bg);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 1.2rem;
      padding: 2rem;
      z-index: 10;
      opacity: 0;
      transform: translateY(40px);
      transition: opacity 0.5s ease, transform 0.5s cubic-bezier(0.34, 1.3, 0.64, 1);
      overflow: hidden;
    }

    .hero.revealed {
      opacity: 1;
      transform: translateY(0);
    }

    /* Atmospheric glow */
    .hero::before {
      content: '';
      position: absolute;
      inset: 0;
      background: radial-gradient(ellipse 60% 50% at 50% 50%, rgba(16,185,129,0.07) 0%, transparent 70%);
      pointer-events: none;
    }

    .eyebrow {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      background: var(--accent-dim);
      border: 1px solid var(--accent-border);
      color: var(--accent);
      padding: 0.4rem 1rem;
      border-radius: 999px;
      font-size: 0.8rem;
      font-weight: 600;
      letter-spacing: 0.07em;
      text-transform: uppercase;
      z-index: 2;
    }

    .headline {
      font-family: var(--font-heading);
      font-size: clamp(2.5rem, 6.5vw, 6rem);
      font-weight: 700;
      text-align: center;
      line-height: 1.05;
      z-index: 2;
    }

    .headline em {
      font-style: normal;
      color: var(--accent);
    }

    .subline {
      font-size: clamp(1rem, 2vw, 1.2rem);
      color: var(--text-secondary);
      text-align: center;
      max-width: 520px;
      line-height: 1.65;
      z-index: 2;
    }

    .cta-btn {
      margin-top: 0.5rem;
      padding: 1rem 2.5rem;
      background: var(--accent);
      color: #0D1117;
      border: none;
      border-radius: 999px;
      font-family: var(--font-heading);
      font-weight: 700;
      font-size: 1.05rem;
      cursor: pointer;
      letter-spacing: 0.02em;
      transition: box-shadow 0.25s, transform 0.2s;
      z-index: 2;
    }

    .cta-btn:hover {
      box-shadow: 0 0 40px rgba(16,185,129,0.5);
      transform: scale(1.05);
    }

    /* Skip button */
    .skip-btn {
      position: fixed;
      top: 1.5rem;
      right: 1.5rem;
      z-index: 400;
      background: transparent;
      border: 1px solid rgba(255,255,255,0.1);
      color: rgba(255,255,255,0.4);
      padding: 0.5rem 1rem;
      border-radius: 8px;
      font-family: var(--font-body);
      font-size: 0.8rem;
      cursor: pointer;
      transition: color 0.2s, border-color 0.2s;
    }

    .skip-btn:hover { color: #fff; border-color: rgba(255,255,255,0.3); }
    .skip-btn.hidden { display: none; }

    /* Replay */
    .replay-btn {
      position: fixed;
      top: 1.5rem;
      right: 1.5rem;
      z-index: 400;
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--text-secondary);
      padding: 0.5rem 1rem;
      border-radius: 8px;
      font-family: var(--font-body);
      font-size: 0.8rem;
      cursor: pointer;
      display: none;
      transition: color 0.2s;
    }

    .replay-btn:hover { color: var(--text); }

    @media (max-width: 600px) {
      .count-number { font-size: 50vw; }
      .count-ring { width: 70vw; height: 70vw; }
    }
  </style>
</head>
<body>

  <!-- Skip button (visible during countdown) -->
  <button class="skip-btn" id="skipBtn" onclick="skipCountdown()">Skip →</button>
  <button class="replay-btn" id="replayBtn" onclick="restartCountdown()">↺ Replay</button>

  <!-- Flash overlay (white camera flash) -->
  <div class="flash" id="flash"></div>

  <!-- COUNTDOWN STAGE -->
  <div class="countdown-stage" id="countdownStage">
    <!-- The big number -->
    <span class="count-number" id="countNum">3</span>

    <!-- Progress ring SVG -->
    <svg class="count-ring" id="countRing" viewBox="0 0 200 200">
      <circle class="ring-track" cx="100" cy="100" r="95"/>
      <circle class="ring-fill"  cx="100" cy="100" r="95" id="ringFill"/>
    </svg>
  </div>

  <!-- HERO (hidden until countdown ends) -->
  <div class="hero" id="hero">
    <div class="eyebrow">
      <span>🚀</span> Platform Launch
    </div>
    <h1 class="headline">
      The Future of<br>Real Estate is <em>Here</em>
    </h1>
    <p class="subline">
      From first contact to closed contract — our platform handles every touchpoint so you can focus on what you do best.
    </p>
    <button class="cta-btn" onclick="alert('Get started!')">Claim Your Spot →</button>
  </div>

  <script>
    // ── Ring circumference: 2π × 95 = 596.9
    const CIRCUMFERENCE = 2 * Math.PI * 95;
    const ringFill      = document.getElementById('ringFill');
    const countNum      = document.getElementById('countNum');
    const countStage    = document.getElementById('countdownStage');
    const flashEl       = document.getElementById('flash');
    const heroEl        = document.getElementById('hero');
    const skipBtn       = document.getElementById('skipBtn');
    const replayBtn     = document.getElementById('replayBtn');

    // Set ring initial state
    ringFill.style.strokeDasharray  = CIRCUMFERENCE;
    ringFill.style.strokeDashoffset = CIRCUMFERENCE;

    let skipCalled = false;

    // ── Single countdown step
    // fadeDur: ms for fade in/out
    // holdDur: ms the number is visible
    function step(num, fadeDur, holdDur, onDone) {
      if (skipCalled) return;

      countNum.style.transition = `opacity ${fadeDur}ms`;
      countNum.textContent = num;
      countNum.classList.add('active');

      // Start ring fill — animates over holdDur ms
      ringFill.style.transition = `stroke-dashoffset ${holdDur}ms linear`;
      ringFill.style.strokeDashoffset = 0;

      // After hold: fade number out, reset ring
      setTimeout(() => {
        if (skipCalled) return;
        countNum.classList.remove('active');

        // Reset ring instantly
        ringFill.style.transition = 'none';
        ringFill.style.strokeDashoffset = CIRCUMFERENCE;

        setTimeout(onDone, fadeDur);
      }, holdDur + fadeDur);
    }

    function doFlash(onDone) {
      if (skipCalled) return;
      flashEl.style.transition = 'opacity 0ms';
      flashEl.style.opacity = '1';
      setTimeout(() => {
        flashEl.style.transition = 'opacity 200ms';
        flashEl.style.opacity = '0';
        setTimeout(onDone, 200);
      }, 80);
    }

    function revealHero() {
      countStage.classList.add('hidden');
      skipBtn.classList.add('hidden');
      heroEl.classList.add('revealed');
      setTimeout(() => { replayBtn.style.display = 'block'; }, 800);
    }

    function runCountdown() {
      skipCalled = false;
      countStage.classList.remove('hidden');
      heroEl.classList.remove('revealed');
      skipBtn.classList.remove('hidden');
      replayBtn.style.display = 'none';

      const FADE = 200;
      const HOLD = 700;

      step(3, FADE, HOLD, () => {
        step(2, FADE, HOLD, () => {
          step(1, FADE, HOLD, () => {
            doFlash(revealHero);
          });
        });
      });
    }

    function skipCountdown() {
      skipCalled = true;
      countStage.classList.add('hidden');
      skipBtn.classList.add('hidden');
      flashEl.style.transition = 'opacity 0ms';
      flashEl.style.opacity = '1';
      setTimeout(() => {
        flashEl.style.transition = 'opacity 200ms';
        flashEl.style.opacity = '0';
        revealHero();
      }, 80);
    }

    function restartCountdown() {
      runCountdown();
    }

    // Start on load
    runCountdown();
  </script>
</body>
</html>
