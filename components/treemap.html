<!-- COMPONENT: Treemap Visualization | COPY: style + html + script -->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Treemap</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg:             #0D1117;
      --surface:        #111827;
      --elevated:       #1E293B;
      --accent:         #10B981;
      --accent-dim:     rgba(16,185,129,0.15);
      --accent-border:  rgba(16,185,129,0.3);
      --border:         rgba(148,163,184,0.1);
      --text:           #F8FAFC;
      --text-secondary: #94A3B8;
      --text-muted:     #475569;
      --radius:         12px;
      --font-heading:   'Space Grotesk', sans-serif;
      --font-body:      'Inter', sans-serif;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--font-body);
      font-size: 13px;
      padding: 24px;
      min-height: 100vh;
    }
    .wrap { max-width: 1100px; margin: 0 auto; }

    /* ── Header ── */
    .tm-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 14px;
      flex-wrap: wrap;
      gap: 10px;
    }
    .tm-title { font-family: var(--font-heading); font-size: 1.125rem; font-weight: 600; }
    .breadcrumb {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 0.8125rem;
      color: var(--text-muted);
    }
    .breadcrumb span { color: var(--text-secondary); }
    .breadcrumb a { color: var(--accent); cursor: pointer; text-decoration: none; }
    .breadcrumb a:hover { text-decoration: underline; }

    /* ── Stats row ── */
    .stats-row {
      display: flex;
      gap: 24px;
      margin-bottom: 14px;
      flex-wrap: wrap;
    }
    .stat { display: flex; flex-direction: column; gap: 1px; }
    .stat-label { font-size: 0.6875rem; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.06em; }
    .stat-val { font-family: var(--font-heading); font-weight: 700; }

    /* ── Treemap canvas ── */
    .tm-canvas-wrap {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
      cursor: pointer;
      position: relative;
    }
    canvas#tm { display: block; width: 100%; }

    /* ── Tooltip ── */
    .tm-tooltip {
      position: fixed;
      background: var(--elevated);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 10px 14px;
      font-size: 0.8125rem;
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.1s;
      z-index: 100;
      white-space: nowrap;
    }
    .tm-tooltip.visible { opacity: 1; }
    .tm-tooltip-name { font-weight: 600; color: var(--text); }
    .tm-tooltip-val { color: var(--accent); }
    .tm-tooltip-pct { color: var(--text-muted); font-size: 0.75rem; }

    /* ── Legend ── */
    .legend {
      display: flex;
      gap: 16px;
      margin-top: 12px;
      flex-wrap: wrap;
    }
    .legend-item {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 0.8125rem;
      color: var(--text-secondary);
      cursor: pointer;
    }
    .legend-swatch {
      width: 12px; height: 12px;
      border-radius: 3px;
      flex-shrink: 0;
    }
  </style>
</head>
<body>
<div class="wrap">

  <div class="tm-header">
    <div>
      <h2 class="tm-title">Budget Allocation — FY 2026</h2>
      <div class="breadcrumb" id="breadcrumb">
        <span>All Categories</span>
      </div>
    </div>
    <div class="stats-row" id="statsRow"></div>
  </div>

  <div class="tm-canvas-wrap">
    <canvas id="tm" height="520"></canvas>
  </div>

  <div class="legend" id="legend"></div>
</div>

<!-- Tooltip -->
<div class="tm-tooltip" id="tmTooltip"></div>

<script>
  // ── Data ─────────────────────────────────────────────────────────
  const categories = [
    {
      name: 'Engineering', color: '#3B82F6',
      children: [
        {name:'Salaries',      value:1_850_000},
        {name:'Infrastructure',value:420_000},
        {name:'Tools & SaaS',  value:180_000},
        {name:'Training',      value:95_000},
        {name:'Contractors',   value:310_000},
      ]
    },
    {
      name: 'Marketing', color: '#10B981',
      children: [
        {name:'Paid Ads',      value:680_000},
        {name:'Content',       value:240_000},
        {name:'Events',        value:190_000},
        {name:'SEO / CRO',     value:120_000},
        {name:'Brand',         value:95_000},
      ]
    },
    {
      name: 'Operations', color: '#F59E0B',
      children: [
        {name:'Office',        value:380_000},
        {name:'HR & Benefits', value:520_000},
        {name:'Legal',         value:210_000},
        {name:'Finance',       value:140_000},
      ]
    },
    {
      name: 'Sales', color: '#8B5CF6',
      children: [
        {name:'Team Salaries', value:920_000},
        {name:'Commission',    value:480_000},
        {name:'CRM & Tools',   value:85_000},
        {name:'Travel',        value:150_000},
      ]
    },
    {
      name: 'R&D', color: '#EF4444',
      children: [
        {name:'Research',      value:340_000},
        {name:'Patents',       value:95_000},
        {name:'Prototyping',   value:180_000},
      ]
    },
  ];

  // Flat list for root view: each category as one block
  function flatRoot() {
    return categories.map(c => ({
      name: c.name,
      value: c.children.reduce((a,b) => a+b.value, 0),
      color: c.color,
      drillable: true,
      parentIdx: null,
    }));
  }

  function flatChildren(idx) {
    const cat = categories[idx];
    return cat.children.map((ch, ci) => ({
      name: ch.name,
      value: ch.value,
      color: lightenColor(cat.color, ci),
      drillable: false,
      parentIdx: idx,
    }));
  }

  // Slightly vary shades within a category
  function lightenColor(hex, i) {
    const r = parseInt(hex.slice(1,3),16);
    const g = parseInt(hex.slice(3,5),16);
    const b = parseInt(hex.slice(5,7),16);
    const factor = 0.7 + i * 0.07;
    const lr = Math.min(255, Math.round(r + (255-r)*(1-factor)));
    const lg = Math.min(255, Math.round(g + (255-g)*(1-factor)));
    const lb = Math.min(255, Math.round(b + (255-b)*(1-factor)));
    return `rgb(${lr},${lg},${lb})`;
  }

  function fmtMoney(v) {
    if (v >= 1_000_000) return '$' + (v/1_000_000).toFixed(2) + 'M';
    return '$' + (v/1000).toFixed(0) + 'k';
  }

  // ── Squarified treemap algorithm ─────────────────────────────────
  // Returns array of {item, x, y, w, h}
  function squarify(items, x, y, w, h) {
    if (!items.length) return [];
    const total = items.reduce((a,b) => a+b.value, 0);
    const rects = [];
    let remaining = items.slice();
    let rx = x, ry = y, rw = w, rh = h;

    while (remaining.length) {
      const row = [];
      let rowSum = 0;
      const shortSide = Math.min(rw, rh);

      for (let i=0; i<remaining.length; i++) {
        const testRow = [...row, remaining[i]];
        const testSum = rowSum + remaining[i].value;
        const ratio = worstRatio(testRow, testSum, shortSide, rw, rh, total, rw*rh);
        if (row.length && ratio > worstRatio(row, rowSum, shortSide, rw, rh, total, rw*rh)) break;
        row.push(remaining[i]);
        rowSum = testSum;
      }

      remaining = remaining.slice(row.length);
      const rowFrac = rowSum / (total > 0 ? ((rw*rh) > 0 ? 1 : total) : 1);
      let offset;

      if (rw <= rh) {
        // Horizontal strip
        const stripH = rh * (rowSum / (remaining.reduce((a,b)=>a+b.value,0)+rowSum));
        // Actually: strip proportional to area
        const stripH2 = (rowSum / total) * h; // relative to original height
        // Use proper proportion
        const areaFrac = rowSum / total;
        const stripHH = areaFrac * (rw * rh) / rw;
        let cx = rx;
        row.forEach(item => {
          const fw = rw * (item.value / rowSum);
          rects.push({ item, x:cx, y:ry, w:fw, h:stripHH });
          cx += fw;
        });
        ry += stripHH;
        rh -= stripHH;
      } else {
        // Vertical strip
        const areaFrac = rowSum / total;
        const stripWW = areaFrac * (rw * rh) / rh;
        let cy = ry;
        row.forEach(item => {
          const fh = rh * (item.value / rowSum);
          rects.push({ item, x:rx, y:cy, w:stripWW, h:fh });
          cy += fh;
        });
        rx += stripWW;
        rw -= stripWW;
      }
      total; // re-reference (no-op but IDE safety)
    }
    return rects;
  }

  function worstRatio(row, rowSum, shortSide, rw, rh, total, area) {
    const s = shortSide;
    const s2 = s * s;
    const rs2 = rowSum * rowSum;
    return Math.max(...row.map(item => {
      const v = item.value;
      return Math.max(s2 * v / rs2, rs2 / (s2 * v));
    }));
  }

  // ── State & render ───────────────────────────────────────────────
  let drillIdx = null; // null = root, number = category index
  let hoveredRect = null;

  function currentItems() {
    return drillIdx === null ? flatRoot() : flatChildren(drillIdx);
  }

  function renderAll() {
    renderBreadcrumb();
    renderStats();
    renderLegend();
    renderCanvas();
  }

  function renderBreadcrumb() {
    const bc = document.getElementById('breadcrumb');
    if (drillIdx === null) {
      bc.innerHTML = '<span>All Categories</span>';
    } else {
      bc.innerHTML = `<a id="bcRoot">All Categories</a> <span>/</span> <span>${categories[drillIdx].name}</span>`;
      bc.querySelector('#bcRoot').addEventListener('click', () => { drillIdx = null; renderAll(); });
    }
  }

  function renderStats() {
    const items = currentItems();
    const total = items.reduce((a,b)=>a+b.value,0);
    const max = items.reduce((a,b)=>b.value>a.value?b:a, items[0]);
    document.getElementById('statsRow').innerHTML = `
      <div class="stat"><div class="stat-label">Total Budget</div><div class="stat-val">${fmtMoney(total)}</div></div>
      <div class="stat"><div class="stat-label">Largest Item</div><div class="stat-val">${max?.name||'—'}</div></div>
      <div class="stat"><div class="stat-label">Items</div><div class="stat-val">${items.length}</div></div>`;
  }

  function renderLegend() {
    const leg = document.getElementById('legend');
    if (drillIdx !== null) { leg.innerHTML = ''; return; }
    leg.innerHTML = categories.map((c, i) => `
      <div class="legend-item" data-ci="${i}">
        <div class="legend-swatch" style="background:${c.color}"></div>
        ${c.name}
      </div>`).join('');
  }

  function renderCanvas() {
    const canvas = document.getElementById('tm');
    const W = canvas.parentElement.clientWidth;
    const H = 520;
    canvas.width = W;
    canvas.height = H;
    const ctx = canvas.getContext('2d');
    ctx.clearRect(0,0,W,H);

    const items = currentItems();
    const total = items.reduce((a,b)=>a+b.value,0);

    // Normalize values for squarify
    const normalized = items.map(it => ({ ...it, value: it.value }));
    const rects = squarify(normalized, 0, 0, W, H);

    canvas._rects = rects;
    canvas._total = total;

    rects.forEach(({item, x, y, w, h}) => {
      const isHovered = hoveredRect && hoveredRect.item === item;
      ctx.fillStyle = isHovered ? lighterColor(item.color, 0.25) : item.color;
      ctx.fillRect(x+1, y+1, w-2, h-2);

      // Label if big enough
      if (w > 70 && h > 40) {
        ctx.fillStyle = 'rgba(0,0,0,0.55)';
        ctx.fillRect(x+1, y+1, w-2, h-2);
        ctx.fillStyle = '#fff';
        ctx.font = `600 ${Math.min(14, w/6)}px Space Grotesk, sans-serif`;
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        const maxW = w - 16;
        const name = w > 110 ? item.name : item.name.split(' ')[0];
        ctx.fillText(name, x + w/2, y + h/2 - (h > 60 ? 8 : 0));
        if (h > 60) {
          ctx.font = `11px Inter, sans-serif`;
          ctx.fillStyle = 'rgba(255,255,255,0.7)';
          ctx.fillText(fmtMoney(item.value), x + w/2, y + h/2 + 10);
        }
      }
      if (isHovered) {
        ctx.strokeStyle = '#fff';
        ctx.lineWidth = 2;
        ctx.strokeRect(x+1, y+1, w-2, h-2);
      }
    });
  }

  function lighterColor(col, amount) {
    if (col.startsWith('rgb')) {
      const [r,g,b] = col.match(/\d+/g).map(Number);
      return `rgb(${Math.min(255,r+Math.round((255-r)*amount))},${Math.min(255,g+Math.round((255-g)*amount))},${Math.min(255,b+Math.round((255-b)*amount))})`;
    }
    return col;
  }

  // ── Hover ────────────────────────────────────────────────────────
  document.getElementById('tm').addEventListener('mousemove', function(e) {
    const rect = this.getBoundingClientRect();
    const mx = e.clientX - rect.left;
    const my = e.clientY - rect.top;
    const tip = document.getElementById('tmTooltip');
    const total = this._total || 1;

    let hit = null;
    (this._rects || []).forEach(r => {
      if (mx >= r.x && mx <= r.x+r.w && my >= r.y && my <= r.y+r.h) hit = r;
    });

    if (hit) {
      const pct = ((hit.item.value/total)*100).toFixed(1);
      tip.innerHTML = `
        <div class="tm-tooltip-name">${hit.item.name}</div>
        <div class="tm-tooltip-val">${fmtMoney(hit.item.value)}</div>
        <div class="tm-tooltip-pct">${pct}% of total</div>`;
      tip.classList.add('visible');
      tip.style.left = (e.clientX+14)+'px';
      tip.style.top  = (e.clientY+14)+'px';
      hoveredRect = hit;
      renderCanvas();
    } else {
      tip.classList.remove('visible');
      hoveredRect = null;
      renderCanvas();
    }
  });

  document.getElementById('tm').addEventListener('mouseleave', () => {
    document.getElementById('tmTooltip').classList.remove('visible');
    hoveredRect = null;
    renderCanvas();
  });

  // ── Click to drill down ──────────────────────────────────────────
  document.getElementById('tm').addEventListener('click', function(e) {
    const rect = this.getBoundingClientRect();
    const mx = e.clientX - rect.left;
    const my = e.clientY - rect.top;
    let hit = null;
    (this._rects || []).forEach(r => {
      if (mx >= r.x && mx <= r.x+r.w && my >= r.y && my <= r.y+r.h) hit = r;
    });
    if (!hit) return;
    if (hit.item.drillable) {
      drillIdx = categories.findIndex(c => c.name === hit.item.name);
      hoveredRect = null;
      renderAll();
    }
  });

  renderAll();
  window.addEventListener('resize', renderCanvas);
</script>
</body>
</html>
