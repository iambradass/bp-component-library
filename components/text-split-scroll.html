<!-- COMPONENT: Text Split Scroll | COPY: style + html + script -->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Text Split Scroll — Component Library</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700;800&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    /* ============================================================
       CUSTOMIZE — adjust these to theme your component
    ============================================================ */
    :root {
      --bg:            #0D1117;
      --bg-surface:    #161B22;
      --accent:        #10B981;
      --accent-soft:   rgba(16, 185, 129, 0.15);
      --text:          #F8FAFC;
      --text-muted:    #475569;
      --text-dim:      #94A3B8;
      --radius:        12px;
      --font-head:     'Space Grotesk', sans-serif;
      --font-body:     'Inter', sans-serif;
    }
    /* ============================================================ */

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html { scroll-behavior: auto; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--font-body);
      line-height: 1.6;
      overflow-x: hidden;
    }

    /* ── Spacers above/below the scroll section ── */
    .spacer {
      min-height: 60vh;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 4rem 2rem;
    }

    .spacer-content {
      max-width: 600px;
    }

    .spacer-content .label {
      font-family: var(--font-head);
      font-size: 0.75rem;
      font-weight: 600;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 1rem;
    }

    .spacer-content h2 {
      font-family: var(--font-head);
      font-size: clamp(1.5rem, 4vw, 2.5rem);
      font-weight: 700;
      color: var(--text-dim);
      line-height: 1.3;
    }

    /* ── Main scroll section ── */
    .tss-section {
      position: relative;
      min-height: 300vh;
    }

    .tss-sticky {
      position: sticky;
      top: 0;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    /* Subtle background atmosphere */
    .tss-sticky::before {
      content: '';
      position: absolute;
      inset: 0;
      background: radial-gradient(ellipse 80% 60% at 50% 50%, rgba(16, 185, 129, 0.04) 0%, transparent 70%);
      pointer-events: none;
    }

    .tss-stage {
      position: relative;
      width: 100%;
      max-width: 960px;
      padding: 0 2rem;
      text-align: center;
    }

    /* ── Primary headline (split words) ── */
    .tss-primary {
      position: relative;
      font-family: var(--font-head);
      font-size: clamp(2rem, 5.5vw, 4.5rem);
      font-weight: 800;
      line-height: 1.1;
      color: var(--text);
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 0 0.3em;
      will-change: opacity;
    }

    .tss-word {
      display: inline-block;
      transition: none; /* driven by JS */
      white-space: nowrap;
    }

    /* ── Secondary message ── */
    .tss-secondary {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 100%;
      padding: 0 2rem;
      font-family: var(--font-head);
      font-size: clamp(1.8rem, 5vw, 4rem);
      font-weight: 800;
      color: var(--accent);
      text-align: center;
      pointer-events: none;
      opacity: 0;
      line-height: 1.2;
      letter-spacing: -0.01em;
    }

    /* ── Third message — slides up after sticky zone ── */
    .tss-third {
      position: relative;
      text-align: center;
      padding: 8rem 2rem 6rem;
      overflow: hidden;
    }

    .tss-third-inner {
      font-family: var(--font-head);
      font-size: clamp(1.5rem, 4vw, 3rem);
      font-weight: 700;
      color: var(--text);
      opacity: 0;
      transform: translateY(60px);
      transition: opacity 0.8s cubic-bezier(0.4, 0, 0.2, 1),
                  transform 0.8s cubic-bezier(0.4, 0, 0.2, 1);
    }

    .tss-third-inner.visible {
      opacity: 1;
      transform: translateY(0);
    }

    .tss-third-inner span {
      color: var(--accent);
    }

    /* ── Scroll indicator ── */
    .tss-scroll-hint {
      position: absolute;
      bottom: 2rem;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.5rem;
      opacity: 1;
      transition: opacity 0.4s ease;
    }

    .tss-scroll-hint.hidden {
      opacity: 0;
    }

    .tss-scroll-hint span {
      font-size: 0.7rem;
      font-weight: 500;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--text-muted);
    }

    .tss-scroll-arrow {
      width: 20px;
      height: 20px;
      border-right: 2px solid var(--text-muted);
      border-bottom: 2px solid var(--text-muted);
      transform: rotate(45deg);
      animation: scrollBounce 1.4s ease-in-out infinite;
    }

    @keyframes scrollBounce {
      0%, 100% { transform: rotate(45deg) translateY(0); }
      50% { transform: rotate(45deg) translateY(5px); }
    }

    /* ── Progress bar ── */
    .tss-progress {
      position: fixed;
      top: 0;
      left: 0;
      height: 2px;
      width: 0%;
      background: var(--accent);
      z-index: 100;
      transition: width 0.1s linear;
    }

    /* ── Component wrapper + demo header ── */
    .demo-header {
      text-align: center;
      padding: 5rem 2rem 2rem;
    }

    .demo-header .badge {
      display: inline-block;
      font-size: 0.7rem;
      font-weight: 600;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--accent);
      background: var(--accent-soft);
      border: 1px solid rgba(16, 185, 129, 0.2);
      border-radius: 100px;
      padding: 0.3rem 0.8rem;
      margin-bottom: 1rem;
    }

    .demo-header h1 {
      font-family: var(--font-head);
      font-size: clamp(1.2rem, 3vw, 1.8rem);
      font-weight: 600;
      color: var(--text-dim);
    }

    /* ── Mobile ── */
    @media (max-width: 375px) {
      .tss-primary {
        font-size: 1.8rem;
        gap: 0 0.25em;
      }
      .tss-secondary {
        font-size: 1.6rem;
      }
    }
  </style>
</head>
<body>

  <div class="tss-progress" id="progressBar"></div>

  <header class="demo-header">
    <div class="badge">Scroll-Driven Text Effect</div>
    <h1>Text Split Scroll</h1>
  </header>

  <!-- Spacer before -->
  <div class="spacer">
    <div class="spacer-content">
      <p class="label">Scroll to Experience</p>
      <h2>Words peel apart as you scroll — revealing what's been true all along.</h2>
    </div>
  </div>

  <!-- THE SCROLL SECTION -->
  <section class="tss-section" id="tssSec">
    <div class="tss-sticky">

      <!-- Scroll hint -->
      <div class="tss-scroll-hint" id="scrollHint">
        <span>Scroll</span>
        <div class="tss-scroll-arrow"></div>
      </div>

      <div class="tss-stage">

        <!-- Primary headline — words split on scroll -->
        <div class="tss-primary" id="primaryLine" aria-label="Your Next Client Is Searching Right Now">
          <!-- Words injected by JS -->
        </div>

        <!-- Secondary message — fades in as primary exits -->
        <div class="tss-secondary" id="secondaryLine" aria-hidden="true">
          Are you showing up?
        </div>

      </div>
    </div>

    <!-- Third message after sticky zone -->
    <div class="tss-third">
      <div class="tss-third-inner" id="thirdLine">
        We make sure <span>you do.</span>
      </div>
    </div>
  </section>

  <!-- Spacer after -->
  <div class="spacer">
    <div class="spacer-content">
      <p class="label">Start Today</p>
      <h2>Stop hiding. The next client is searching your name right now.</h2>
    </div>
  </div>

  <script>
    (() => {
      'use strict';

      // ── Config ──────────────────────────────────────────────
      const HEADLINE = 'Your Next Client Is Searching Right Now';
      const WORDS = HEADLINE.split(' ');
      const CENTER_INDEX = Math.floor(WORDS.length / 2); // 4

      // ── DOM refs ────────────────────────────────────────────
      const section    = document.getElementById('tssSec');
      const primaryEl  = document.getElementById('primaryLine');
      const secondary  = document.getElementById('secondaryLine');
      const thirdLine  = document.getElementById('thirdLine');
      const scrollHint = document.getElementById('scrollHint');
      const progressBar = document.getElementById('progressBar');

      // ── Build word spans ────────────────────────────────────
      WORDS.forEach((word, i) => {
        const span = document.createElement('span');
        span.className = 'tss-word';
        span.textContent = word;
        span.setAttribute('aria-hidden', 'true');
        // store relative offset from center
        const offset = i - CENTER_INDEX; // negative = left, positive = right
        span.dataset.offset = offset;
        primaryEl.appendChild(span);
      });

      const wordSpans = primaryEl.querySelectorAll('.tss-word');

      // ── Scroll driver ────────────────────────────────────────
      let raf = null;

      function getProgress() {
        const rect = section.getBoundingClientRect();
        const totalScroll = rect.height - window.innerHeight;
        const scrolled = -rect.top;
        return Math.max(0, Math.min(1, scrolled / totalScroll));
      }

      function applyProgress(p) {
        // Phase 1: 0 → 0.55 — words peel apart
        // Phase 2: 0.55 → 0.75 — secondary fades in
        // Phase 3: 0.75 → 1 — transition complete

        const peelProgress = Math.max(0, Math.min(1, p / 0.6));
        const secondaryP   = Math.max(0, Math.min(1, (p - 0.45) / 0.25));
        const primaryOpacity = Math.max(0, 1 - (p / 0.6));

        // Update progress bar
        progressBar.style.width = (p * 100) + '%';

        // Scroll hint
        if (p > 0.05) {
          scrollHint.classList.add('hidden');
        } else {
          scrollHint.classList.remove('hidden');
        }

        // Move each word
        wordSpans.forEach(span => {
          const offset = parseFloat(span.dataset.offset);
          const absOffset = Math.abs(offset);
          const direction = offset < 0 ? -1 : offset > 0 ? 1 : 0;

          // Center word just fades
          if (offset === 0) {
            span.style.opacity = (1 - peelProgress * 1.4).toFixed(3);
            span.style.transform = '';
            return;
          }

          // Outer words travel further
          const distance = absOffset * 140 * peelProgress;
          const yShift   = peelProgress * -20 * (absOffset * 0.3);
          const scl       = 1 - peelProgress * 0.15 * absOffset * 0.3;

          span.style.transform = `translateX(${direction * distance}px) translateY(${yShift}px) scale(${scl})`;
          span.style.opacity   = Math.max(0, 1 - peelProgress * (0.6 + absOffset * 0.15)).toFixed(3);
        });

        // Secondary message
        secondary.style.opacity = secondaryP.toFixed(3);
        const secScale = 0.88 + secondaryP * 0.12;
        secondary.style.transform = `translate(-50%, -50%) scale(${secScale})`;
      }

      function onScroll() {
        if (raf) return;
        raf = requestAnimationFrame(() => {
          raf = null;
          applyProgress(getProgress());
        });
      }

      // ── Third line — IntersectionObserver ────────────────────
      const thirdObserver = new IntersectionObserver(entries => {
        entries.forEach(e => {
          if (e.isIntersecting) {
            thirdLine.classList.add('visible');
          }
        });
      }, { threshold: 0.4 });

      thirdObserver.observe(thirdLine);

      // ── Init ─────────────────────────────────────────────────
      window.addEventListener('scroll', onScroll, { passive: true });
      applyProgress(getProgress());

    })();
  </script>
</body>
</html>
