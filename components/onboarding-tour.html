<!-- COMPONENT: Product Spotlight Tour | COPY: style + html + script -->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Onboarding Tour</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    /* ── Customize ── */
    :root {
      --bg:            #0D1117;
      --surface:       #111827;
      --elevated:      #1E293B;
      --accent:        #10B981;
      --accent-dim:    rgba(16,185,129,0.15);
      --accent-border: rgba(16,185,129,0.3);
      --border:        rgba(148,163,184,0.1);
      --text:          #F8FAFC;
      --text-secondary:#94A3B8;
      --text-muted:    #475569;
      --radius:        12px;
      --font-heading:  'Space Grotesk', sans-serif;
      --font-body:     'Inter', sans-serif;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--font-body);
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* ── Fake Dashboard Layout ── */
    .dashboard {
      display: grid;
      grid-template-columns: 220px 1fr;
      grid-template-rows: 56px 1fr;
      min-height: 100vh;
    }

    /* Top bar */
    .topbar {
      grid-column: 1 / -1;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 1rem;
      padding: 0 1.25rem;
    }

    .topbar-logo {
      font-family: var(--font-heading);
      font-weight: 700;
      font-size: 1rem;
      color: var(--accent);
      margin-right: 0.5rem;
    }

    .topbar-search {
      flex: 1;
      max-width: 320px;
    }

    .search-input {
      width: 100%;
      background: var(--elevated);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 0.45rem 0.75rem 0.45rem 2.25rem;
      color: var(--text);
      font-size: 0.85rem;
      font-family: var(--font-body);
      outline: none;
    }

    .search-wrap {
      position: relative;
      flex: 1;
      max-width: 320px;
    }

    .search-wrap svg {
      position: absolute;
      left: 0.6rem;
      top: 50%;
      transform: translateY(-50%);
      color: var(--text-muted);
      pointer-events: none;
    }

    .spacer { flex: 1; }

    .topbar-notif {
      position: relative;
      background: none;
      border: none;
      color: var(--text-secondary);
      cursor: pointer;
      padding: 0.4rem;
      border-radius: 8px;
    }

    .notif-badge {
      position: absolute;
      top: 2px;
      right: 2px;
      width: 8px;
      height: 8px;
      background: #EF4444;
      border-radius: 50%;
      border: 2px solid var(--surface);
    }

    .topbar-avatar {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--accent), #065F46);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.75rem;
      font-weight: 700;
      color: #000;
      cursor: pointer;
    }

    /* Sidebar */
    .sidebar {
      background: var(--surface);
      border-right: 1px solid var(--border);
      padding: 1rem 0.75rem;
      display: flex;
      flex-direction: column;
      gap: 0.25rem;
    }

    .nav-item {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      padding: 0.6rem 0.75rem;
      border-radius: 8px;
      font-size: 0.875rem;
      font-weight: 500;
      color: var(--text-secondary);
      cursor: pointer;
      transition: background 0.15s, color 0.15s;
    }

    .nav-item:hover { background: var(--elevated); color: var(--text); }
    .nav-item.active { background: var(--accent-dim); color: var(--accent); }

    .sidebar-spacer { flex: 1; }

    .nav-settings {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      padding: 0.6rem 0.75rem;
      border-radius: 8px;
      font-size: 0.875rem;
      font-weight: 500;
      color: var(--text-muted);
      cursor: pointer;
    }

    /* Main content */
    .main-content {
      padding: 1.5rem;
      overflow-y: auto;
    }

    .content-title {
      font-family: var(--font-heading);
      font-size: 1.3rem;
      font-weight: 600;
      margin-bottom: 1.25rem;
    }

    /* Widgets grid */
    .widgets-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 1rem;
      margin-bottom: 1.5rem;
    }

    .widget {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 1.25rem;
    }

    .widget-label {
      font-size: 0.78rem;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.08em;
      margin-bottom: 0.5rem;
    }

    .widget-value {
      font-family: var(--font-heading);
      font-size: 1.8rem;
      font-weight: 700;
      color: var(--accent);
    }

    .widget-sub {
      font-size: 0.78rem;
      color: var(--text-secondary);
      margin-top: 0.25rem;
    }

    .chart-placeholder {
      height: 80px;
      background: var(--elevated);
      border-radius: 8px;
      margin-top: 0.75rem;
      display: flex;
      align-items: flex-end;
      gap: 3px;
      padding: 0 0.5rem 0.5rem;
      overflow: hidden;
    }

    .bar {
      flex: 1;
      background: var(--accent-dim);
      border-radius: 3px 3px 0 0;
    }

    .bar.tall { background: var(--accent); }

    /* Start tour button */
    .start-tour-btn {
      position: fixed;
      bottom: 1.5rem;
      right: 1.5rem;
      z-index: 50;
      background: var(--accent);
      color: #000;
      border: none;
      border-radius: 999px;
      padding: 0.7rem 1.4rem;
      font-family: var(--font-heading);
      font-weight: 600;
      font-size: 0.9rem;
      cursor: pointer;
      box-shadow: 0 4px 20px var(--accent-dim);
      display: flex;
      align-items: center;
      gap: 0.5rem;
      transition: transform 0.15s, filter 0.15s;
    }
    .start-tour-btn:hover { transform: translateY(-2px); filter: brightness(1.1); }

    /* ── Tour Overlay ── */
    .tour-backdrop {
      position: fixed;
      inset: 0;
      z-index: 100;
      pointer-events: none;
      /* The spotlight is created via box-shadow on the highlight element */
    }

    /* The highlight element is positioned over the target and creates the cutout effect */
    .tour-highlight {
      position: fixed;
      z-index: 101;
      border-radius: 8px;
      pointer-events: none;
      /* A large box-shadow creates the dark overlay with a transparent "hole" */
      box-shadow: 0 0 0 9999px rgba(0,0,0,0.65);
      transition: top 0.4s cubic-bezier(0.4,0,0.2,1),
                  left 0.4s cubic-bezier(0.4,0,0.2,1),
                  width 0.4s cubic-bezier(0.4,0,0.2,1),
                  height 0.4s cubic-bezier(0.4,0,0.2,1);
    }

    /* Tour tooltip card */
    .tour-tooltip {
      position: fixed;
      z-index: 102;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 1.25rem 1.5rem;
      width: 300px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.5);
      transition: top 0.4s cubic-bezier(0.4,0,0.2,1),
                  left 0.4s cubic-bezier(0.4,0,0.2,1);
    }

    .tooltip-step {
      font-size: 0.72rem;
      font-weight: 600;
      color: var(--accent);
      text-transform: uppercase;
      letter-spacing: 0.1em;
      margin-bottom: 0.5rem;
    }

    .tooltip-title {
      font-family: var(--font-heading);
      font-size: 1rem;
      font-weight: 600;
      margin-bottom: 0.5rem;
    }

    .tooltip-desc {
      font-size: 0.85rem;
      color: var(--text-secondary);
      line-height: 1.6;
      margin-bottom: 1.25rem;
    }

    /* Progress dots */
    .tooltip-dots {
      display: flex;
      gap: 5px;
      margin-bottom: 1rem;
    }

    .tour-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--elevated);
      transition: background 0.2s, width 0.2s;
    }

    .tour-dot.active {
      background: var(--accent);
      width: 16px;
      border-radius: 3px;
    }

    .tooltip-actions {
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    .btn-skip {
      background: none;
      border: none;
      color: var(--text-muted);
      font-size: 0.82rem;
      cursor: pointer;
      padding: 0.4rem;
      margin-right: auto;
    }
    .btn-skip:hover { color: var(--text-secondary); }

    .btn-back {
      background: var(--elevated);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text-secondary);
      font-size: 0.85rem;
      font-weight: 500;
      padding: 0.5rem 1rem;
      cursor: pointer;
    }
    .btn-back:hover { border-color: var(--accent-border); color: var(--text); }

    .btn-next {
      background: var(--accent);
      border: none;
      border-radius: 8px;
      color: #000;
      font-size: 0.85rem;
      font-weight: 600;
      padding: 0.5rem 1.25rem;
      cursor: pointer;
      font-family: var(--font-heading);
    }
    .btn-next:hover { filter: brightness(1.1); }

    /* Confetti container */
    .confetti-wrap {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 200;
      overflow: hidden;
    }

    .confetti-piece {
      position: absolute;
      width: 8px;
      height: 8px;
      border-radius: 2px;
      animation: confettiFall linear forwards;
    }

    @keyframes confettiFall {
      0%   { transform: translateY(-20px) rotate(0deg); opacity: 1; }
      100% { transform: translateY(100vh) rotate(720deg); opacity: 0; }
    }

    /* Hidden state */
    .tour-hidden { display: none !important; }
  </style>
</head>
<body>

  <!-- ── Fake Dashboard ── -->
  <div class="dashboard">

    <!-- Top bar -->

    <!-- Main content -->

  </div>

  <!-- ── Tour Elements ── -->
  <!-- Spotlight highlight div — positioned over the target element -->
  <div class="tour-highlight tour-hidden" id="tourHighlight"></div>
  <!-- Confetti container -->
  <div class="confetti-wrap" id="confettiWrap"></div>

  <!-- Tour tooltip -->
  <div class="tour-tooltip tour-hidden" id="tourTooltip">
    <div class="tooltip-step" id="tooltipStep">Step 1 of 5</div>
    <div class="tooltip-dots" id="tooltipDots"></div>
    <div class="tooltip-title" id="tooltipTitle"></div>
    <div class="tooltip-desc"  id="tooltipDesc"></div>
    <div class="tooltip-actions">
      <button class="btn-skip" id="btnSkipTour">Skip tour</button>
      <button class="btn-back" id="btnBack">Back</button>
      <button class="btn-next" id="btnNext">Next</button>
    </div>
  </div>

  <!-- Start tour button (visible when tour is not active) -->
  <button class="start-tour-btn" id="startTourBtn">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><polygon points="10 8 16 12 10 16 10 8"/></svg>
    Take the Tour
  </button>

  <script>
    // ── Tour Steps Configuration ──
    // Each step targets a DOM element by ID and specifies tooltip position
    const STEPS = [
      {
        targetId:  'tourSidebar',
        title:     'Navigation Sidebar',
        desc:      'Use the sidebar to navigate between all main sections of Dashify — Dashboard, Analytics, Team management, and Billing.',
        placement: 'right',
      },
      {
        targetId:  'tourSearch',
        title:     'Global Search',
        desc:      'Find anything instantly. Search across reports, team members, transactions, and settings — all from one place.',
        placement: 'bottom',
      },
      {
        targetId:  'tourNotif',
        title:     'Notifications',
        desc:      'Stay on top of activity. The red badge tells you how many unread notifications are waiting. Click to view them all.',
        placement: 'bottom-left',
      },
      {
        targetId:  'tourWidget',
        title:     'Data Widgets',
        desc:      'At-a-glance metrics with sparkline charts. Click any widget to drill down into the full report with filters and date ranges.',
        placement: 'right',
      },
      {
        targetId:  'tourSettings',
        title:     "You're All Set!",
        desc:      "Configure your workspace, integrations, and notification preferences in Settings. Welcome aboard — you've completed the tour!",
        placement: 'top-right',
        isLast:    true,
      },
    ];

    let currentStep = 0;
    let tourActive  = false;

    const highlight   = document.getElementById('tourHighlight');
    const tooltip     = document.getElementById('tourTooltip');
    const tooltipStep = document.getElementById('tooltipStep');
    const tooltipDots = document.getElementById('tooltipDots');
    const tooltipTitle= document.getElementById('tooltipTitle');
    const tooltipDesc = document.getElementById('tooltipDesc');
    const btnBack     = document.getElementById('btnBack');
    const btnNext     = document.getElementById('btnNext');
    const btnSkip     = document.getElementById('btnSkipTour');
    const startBtn    = document.getElementById('startTourBtn');
    const confettiWrap= document.getElementById('confettiWrap');

    const MARGIN = 12; // spacing between spotlight and tooltip

    // Build progress dots
    function buildDots() {
      tooltipDots.innerHTML = '';
      STEPS.forEach((_, i) => {
        const dot = document.createElement('div');
        dot.className = 'tour-dot' + (i === currentStep ? ' active' : '');
        tooltipDots.appendChild(dot);
      });
    }

    // Position the tooltip relative to the target element
    function positionTooltip(targetRect, placement) {
      const TW = 300; // tooltip width
      const vpW = window.innerWidth;
      const vpH = window.innerHeight;

      let top, left;

      switch (placement) {
        case 'right':
          top  = targetRect.top + targetRect.height / 2 - 80;
          left = targetRect.right + MARGIN;
          break;
        case 'bottom':
          top  = targetRect.bottom + MARGIN;
          left = targetRect.left + targetRect.width / 2 - TW / 2;
          break;
        case 'bottom-left':
          top  = targetRect.bottom + MARGIN;
          left = targetRect.right - TW;
          break;
        case 'top-right':
          top  = targetRect.top - 160 - MARGIN;
          left = targetRect.right - TW;
          break;
        default:
          top  = targetRect.bottom + MARGIN;
          left = targetRect.left;
      }

      // Clamp to viewport
      left = Math.max(MARGIN, Math.min(left, vpW - TW - MARGIN));
      top  = Math.max(MARGIN, Math.min(top, vpH - 220 - MARGIN));

      tooltip.style.top  = top + 'px';
      tooltip.style.left = left + 'px';
    }

    // Show a specific step
    function showStep(index) {
      const step   = STEPS[index];
      const target = document.getElementById(step.targetId);
      if (!target) return;

      const rect = target.getBoundingClientRect();
      const PAD  = 6; // padding around the spotlight

      // Position the highlight (spotlight cutout)
      highlight.style.top    = (rect.top - PAD)  + 'px';
      highlight.style.left   = (rect.left - PAD) + 'px';
      highlight.style.width  = (rect.width + PAD * 2)  + 'px';
      highlight.style.height = (rect.height + PAD * 2) + 'px';

      // Populate tooltip content
      tooltipStep.textContent  = `Step ${index + 1} of ${STEPS.length}`;
      tooltipTitle.textContent = step.title;
      tooltipDesc.textContent  = step.desc;

      buildDots();

      // Last step: change button to "Start Exploring"
      if (step.isLast) {
        btnNext.textContent = 'Start Exploring';
        spawnConfetti();
      } else {
        btnNext.textContent = 'Next';
      }

      // Hide Back on first step
      btnBack.style.display = index === 0 ? 'none' : '';

      // Wait a tick for layout, then position tooltip
      requestAnimationFrame(() => positionTooltip(target.getBoundingClientRect(), step.placement));
    }

    // Start the tour
    function startTour() {
      tourActive   = true;
      currentStep  = 0;
      startBtn.classList.add('tour-hidden');
      highlight.classList.remove('tour-hidden');
      tooltip.classList.remove('tour-hidden');
      showStep(0);
    }

    // End the tour
    function endTour() {
      tourActive = false;
      highlight.classList.add('tour-hidden');
      tooltip.classList.add('tour-hidden');
      startBtn.classList.remove('tour-hidden');
    }

    // Spawn confetti particles
    function spawnConfetti() {
      const COLORS = ['#10B981','#06B6D4','#F97316','#A855F7','#F43F5E','#FBBF24'];
      for (let i = 0; i < 60; i++) {
        const piece = document.createElement('div');
        piece.className = 'confetti-piece';
        piece.style.left  = Math.random() * 100 + 'vw';
        piece.style.top   = '-10px';
        piece.style.background = COLORS[Math.floor(Math.random() * COLORS.length)];
        piece.style.animationDuration = (1.5 + Math.random() * 2) + 's';
        piece.style.animationDelay    = (Math.random() * 0.8) + 's';
        piece.style.transform = `rotate(${Math.random() * 360}deg)`;
        confettiWrap.appendChild(piece);
        piece.addEventListener('animationend', () => piece.remove());
      }
    }

    // ── Control handlers ──
    btnNext.addEventListener('click', () => {
      if (currentStep >= STEPS.length - 1) {
        endTour();
      } else {
        currentStep++;
        showStep(currentStep);
      }
    });

    btnBack.addEventListener('click', () => {
      if (currentStep > 0) {
        currentStep--;
        showStep(currentStep);
      }
    });

    btnSkip.addEventListener('click', endTour);
    startBtn.addEventListener('click', startTour);

    // Reposition on resize
    window.addEventListener('resize', () => {
      if (tourActive) showStep(currentStep);
    });
  </script>
</body>
</html>
