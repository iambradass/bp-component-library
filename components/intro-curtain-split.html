<!-- COMPONENT: Intro: Curtain Split | COPY: style + html + script -->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Intro: Curtain Split — Component Library</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">

  <style>

    /* ─────────────────────────────────────────
       CUSTOMIZE
    ───────────────────────────────────────── */
    :root {
      --panel-color:     #0B0F1A;
      --panel-color-r:   #0E1320;
      --seam-color:      #10B981;
      --accent:          #10B981;
      --bg:              #0D1117;
      --text:            #F8FAFC;
      --text-secondary:  #94A3B8;
      --font-heading:    'Space Grotesk', system-ui, sans-serif;
      --font-body:       'Inter', system-ui, sans-serif;

      /* Brand mark text split across panels */
      --brand-left:      "TITLE";
      --brand-right:     "EDGE";
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body { height: 100%; overflow-x: hidden; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--font-body);
    }

    /* ── Curtain wrapper ── */
    #curtain {
      position: fixed;
      inset: 0;
      z-index: 1000;
      display: flex;
      pointer-events: auto;
      perspective: 1200px;
    }

    #curtain.done { pointer-events: none; }

    /* ── Panels ── */
    .panel {
      position: absolute;
      top: 0;
      bottom: 0;
      width: 50%;
      overflow: hidden;

      /* Velvet-fabric texture */
      background-image:
        repeating-linear-gradient(
          90deg,
          transparent,
          transparent 10px,
          rgba(255,255,255,0.012) 10px,
          rgba(255,255,255,0.012) 11px
        );
      will-change: transform;
    }

    .panel-left {
      left: 0;
      background-color: var(--panel-color);
      transform-origin: left center;
    }

    .panel-right {
      right: 0;
      background-color: var(--panel-color-r);
      transform-origin: right center;
    }

    /* Opening state */
    .panel-left.open {
      transform: translateX(-100%) rotateY(-5deg);
      transition: transform 900ms cubic-bezier(0.7, 0, 0.3, 1);
    }

    .panel-right.open {
      transform: translateX(100%) rotateY(5deg);
      transition: transform 900ms cubic-bezier(0.7, 0, 0.3, 1);
    }

    /* ── Brand mark on panels ── */
    .panel-brand {
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      font-family: var(--font-heading);
      font-size: clamp(3rem, 10vw, 8rem);
      font-weight: 800;
      color: rgba(255,255,255,0.08);
      letter-spacing: -0.02em;
      line-height: 1;
      pointer-events: none;
      user-select: none;
      white-space: nowrap;
    }

    .panel-left .panel-brand {
      right: -4px; /* flush to seam edge */
      /* Show only the right portion — clip left overhang */
    }

    .panel-right .panel-brand {
      left: -4px;
    }

    /* Actual visible brand (slightly more opaque) */
    .panel-brand-main {
      color: rgba(255,255,255,0.15);
    }

    /* ── Vertical glowing seam ── */
    #seam {
      position: fixed;
      left: 50%;
      top: 0;
      bottom: 0;
      width: 2px;
      transform: translateX(-50%);
      z-index: 1010;
      background: var(--seam-color);
      box-shadow:
        0 0 6px var(--seam-color),
        0 0 18px rgba(16,185,129,0.5),
        0 0 40px rgba(16,185,129,0.2);
      opacity: 0;
      transition: opacity 300ms ease;
      pointer-events: none;
    }

    #seam.visible { opacity: 1; }
    #seam.gone    { opacity: 0; transition: opacity 200ms ease; }

    /* ── Hero page ── */
    #hero-page {
      position: relative;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 40px 24px;
    }

    .hero-eyebrow {
      display: inline-flex;
      align-items: center;
      gap: 7px;
      font-size: 0.68rem;
      font-weight: 600;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--accent);
      background: rgba(16,185,129,0.1);
      border: 1px solid rgba(16,185,129,0.3);
      border-radius: 100px;
      padding: 5px 14px;
      margin-bottom: 24px;
      opacity: 0;
      transform: translateY(20px);
    }
    .hero-eyebrow.in {
      opacity: 1;
      transform: translateY(0);
      transition: opacity 500ms ease 200ms, transform 500ms ease 200ms;
    }

    .hero-title {
      font-family: var(--font-heading);
      font-size: clamp(2.2rem, 5vw, 3.75rem);
      font-weight: 800;
      letter-spacing: -0.04em;
      line-height: 1.06;
      margin-bottom: 20px;
      max-width: 680px;
      opacity: 0;
      transform: translateY(30px);
    }
    .hero-title.in {
      opacity: 1;
      transform: translateY(0);
      transition: opacity 550ms ease 350ms, transform 600ms cubic-bezier(0.34, 1.2, 0.64, 1) 350ms;
    }

    .hero-sub {
      font-size: 1rem;
      color: var(--text-secondary);
      line-height: 1.7;
      max-width: 480px;
      margin-bottom: 36px;
      opacity: 0;
      transform: translateY(20px);
    }
    .hero-sub.in {
      opacity: 1;
      transform: translateY(0);
      transition: opacity 500ms ease 500ms, transform 500ms ease 500ms;
    }

    .hero-cta {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: var(--accent);
      color: #0D1117;
      font-family: var(--font-heading);
      font-size: 0.95rem;
      font-weight: 700;
      padding: 14px 32px;
      border-radius: 8px;
      border: none;
      cursor: pointer;
      opacity: 0;
      transform: translateY(20px) scale(0.94);
    }
    .hero-cta.in {
      opacity: 1;
      transform: translateY(0) scale(1);
      transition: opacity 500ms ease 650ms, transform 600ms cubic-bezier(0.34, 1.56, 0.64, 1) 650ms;
    }
    .hero-cta:hover { transform: translateY(-2px); box-shadow: 0 8px 28px rgba(16,185,129,0.35); }

    @media (max-width: 375px) {
      .panel-brand { font-size: clamp(1.8rem, 12vw, 4rem); }
    }

  </style>
</head>
<body>

  <!-- ── Curtain panels ── -->
  <div id="curtain">
    <div class="panel panel-left" id="panel-left">
      <div class="panel-brand panel-brand-main">TITLE</div>
    </div>
    <div class="panel panel-right" id="panel-right">
      <div class="panel-brand panel-brand-main">EDGE</div>
    </div>
  </div>

  <!-- ── Glowing seam ── -->
  <div id="seam"></div>

  <!-- ── Hero page ── -->
  <div id="hero-page">
    <div class="hero-eyebrow" id="hero-eyebrow">
      <span style="width:5px;height:5px;border-radius:50%;background:currentColor;display:inline-block"></span>
      Title Marketing Platform
    </div>
    <h1 class="hero-title" id="hero-title">Your market is waiting.<br>We make sure they find you.</h1>
    <p class="hero-sub" id="hero-sub">Title Edge builds and runs your entire digital presence — so you stop chasing referrals and start attracting them.</p>
    <button class="hero-cta" id="hero-cta">Get Your Free Strategy Call →</button>
  </div>

  <script>
  (function() {
    'use strict';

    function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }

    const curtain = document.getElementById('curtain');
    const panelL  = document.getElementById('panel-left');
    const panelR  = document.getElementById('panel-right');
    const seam    = document.getElementById('seam');

    const heroEls = [
      document.getElementById('hero-eyebrow'),
      document.getElementById('hero-title'),
      document.getElementById('hero-sub'),
      document.getElementById('hero-cta'),
    ];

    async function run() {
      // Hold briefly so page loads fully
      await sleep(500);

      // 1. Glowing seam appears
      seam.classList.add('visible');
      await sleep(600);

      // 2. Panels slide open with perspective peel
      panelL.classList.add('open');
      panelR.classList.add('open');

      // 3. Seam fades as panels separate
      await sleep(200);
      seam.classList.add('gone');

      // 4. Hero content animates in staggered
      await sleep(600);
      heroEls.forEach(el => el.classList.add('in'));

      // 5. Clean up curtain after animation completes
      await sleep(950);
      curtain.classList.add('done');
      setTimeout(() => { curtain.style.display = 'none'; }, 100);
    }

    run();

  })();
  </script>

</body>
</html>
